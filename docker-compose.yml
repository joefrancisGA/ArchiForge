# ArchiForge development dependencies
# ────────────────────────────────────────────────────────────────────
# Default (hot-reload dev):
#   docker compose up -d
#   → SQL Server, Azurite, Redis only. Run API + UI natively.
#
# Full-stack integration (containerised API + UI):
#   docker compose --profile full-stack up -d
#   → Everything, including the ArchiForge API and Operator UI images.
#
# SQL Server: localhost:1433
# Azurite:    localhost:10000 (blob), 10001 (queue), 10002 (table)
# Redis:      localhost:6379
# API:        localhost:5000 (full-stack profile only)
# UI:         localhost:3000 (full-stack profile only)
#
# Connection string for SQL:
#   Server=localhost,1433;Database=ArchiForge;User Id=sa;Password=ArchiForge_Dev_Pass123!;TrustServerCertificate=True;
# ────────────────────────────────────────────────────────────────────

services:
  # ── Infrastructure (always started) ────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: archiforge-sql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ArchiForge_Dev_Pass123!"
      MSSQL_PID: "Developer"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ArchiForge_Dev_Pass123!' -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: archiforge-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:10000/',r=>process.exit(r.statusCode?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: archiforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application (full-stack profile only) ──────────────────────
  api:
    profiles: ["full-stack"]
    build:
      context: .
      dockerfile: ArchiForge.Api/Dockerfile
    container_name: archiforge-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__ArchiForge: "Server=sqlserver,1433;Database=ArchiForge;User Id=sa;Password=ArchiForge_Dev_Pass123!;TrustServerCertificate=True;"
      ArchiForge__StorageProvider: "Sql"
      ArchiForge__Auth__Mode: "DevelopmentBypass"
    depends_on:
      sqlserver:
        condition: service_healthy
      azurite:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080/health/live",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  ui:
    profiles: ["full-stack"]
    build:
      context: archiforge-ui
      dockerfile: Dockerfile
    container_name: archiforge-ui
    ports:
      - "3000:3000"
    environment:
      ARCHIFORGE_API_BASE_URL: "http://api:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  azurite-data: {}
