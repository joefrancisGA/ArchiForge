# ArchLucid development dependencies
# ────────────────────────────────────────────────────────────────────
# Default (hot-reload dev):
#   docker compose up -d
#   → SQL Server, Azurite, Redis only. Run API + UI natively.
#
# Full-stack integration (containerised API + UI):
#   docker compose --profile full-stack up -d
#   → Everything, including the ArchLucid API and Operator UI images.
#
# SQL Server: localhost:1433
# Azurite:    localhost:10000 (blob), 10001 (queue), 10002 (table)
# Redis:      localhost:6379
# API:        localhost:5000 (full-stack profile only)
# UI:         localhost:3000 (full-stack profile only)
#
# Connection string for SQL:
#   Server=localhost,1433;Database=ArchLucid;User Id=sa;Password=ArchLucid_Dev_Pass123!;TrustServerCertificate=True;
#
# The **ArchLucid** database is created by **sqlserver-init** after SQL is healthy (DbUp requires the catalog to exist).
# Full-stack **api** service raises **RateLimiting** permit limits so k6 / local load scripts are not capped at 100 req/min.
# ────────────────────────────────────────────────────────────────────

services:
  # ── Infrastructure (always started) ────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: archlucid-sql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ArchLucid_Dev_Pass123!"
      MSSQL_PID: "Developer"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ArchLucid_Dev_Pass123!' -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # Creates Application Catalog=ArchLucid once SQL is healthy (DbUp expects this DB to exist).
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: archlucid-sql-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "ArchLucid_Dev_Pass123!"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "ArchLucid_Dev_Pass123!" -C
        -Q "IF DB_ID(N'ArchLucid') IS NULL CREATE DATABASE ArchLucid;"
    restart: "no"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: archlucid-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:10000/',r=>process.exit(r.statusCode?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: archlucid-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application (full-stack profile only) ──────────────────────
  api:
    profiles: ["full-stack"]
    build:
      context: .
      dockerfile: ArchLucid.Api/Dockerfile
    container_name: archlucid-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__ArchLucid: "Server=sqlserver,1433;Database=ArchLucid;User Id=sa;Password=ArchLucid_Dev_Pass123!;TrustServerCertificate=True;"
      ArchLucid__StorageProvider: "Sql"
      # Match local dev UX: Contoso demo rows after first boot (appsettings.Development.json also enables this).
      Demo__Enabled: "true"
      Demo__SeedOnStartup: "true"
      ArchLucidAuth__Mode: "DevelopmentBypass"
      # k6 / load scripts exceed default 100/min on fixed-window policy (see docs/PERFORMANCE_TESTING.md, ci.yml k6 job).
      RateLimiting__FixedWindow__PermitLimit: "200000"
      RateLimiting__FixedWindow__WindowMinutes: "1"
      RateLimiting__Expensive__PermitLimit: "200000"
      RateLimiting__Expensive__WindowMinutes: "1"
      RateLimiting__Replay__Light__PermitLimit: "200000"
      RateLimiting__Replay__Heavy__PermitLimit: "200000"
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      azurite:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080/health/live",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  ui:
    profiles: ["full-stack"]
    build:
      context: archlucid-ui
      dockerfile: Dockerfile
    container_name: archlucid-ui
    ports:
      - "3000:3000"
    environment:
      ARCHLUCID_API_BASE_URL: "http://api:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  azurite-data: {}
