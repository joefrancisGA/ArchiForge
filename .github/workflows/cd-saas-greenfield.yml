# cd-saas-greenfield.yml
# -----------------------
# Status: DRAFT (workflow_dispatch only). Do NOT enable schedule until OIDC
# federation is configured against the dedicated greenfield-test subscription
# AND a successful manual run has been reviewed.
#
# Purpose
#   Prove every quarter that infra/terraform applies cleanly against an empty
#   Azure subscription, that DbUp migrates a greenfield SQL catalog, and that
#   a deployed API (optional) reaches /health/ready.
#
# Required repository secrets (add when enabling):
#   AZURE_GREENFIELD_TENANT_ID
#   AZURE_GREENFIELD_SUBSCRIPTION_ID
#   AZURE_GREENFIELD_CLIENT_ID    # OIDC federated identity for this workflow only
#
# Optional (full Terraform apply of infra/terraform-otel-collector in the disposable RG):
#   AZURE_GREENFIELD_CAE_ID
#   AZURE_GREENFIELD_APPINSIGHTS_CS
#
# Optional (smoke / doctor against a known API base; strip path if present, https assumed):
#   GREENFIELD_SMOKE_API_BASE_URL
#
# Cleanup contract
#   The destroy job runs in `if: always()` to avoid orphan spend. If destroy
#   fails, the run is marked failed and #ops is paged via the existing
#   alerting path documented in docs/runbooks/INFRASTRUCTURE_OPS.md.

name: cd-saas-greenfield (DRAFT)

on:
  workflow_dispatch:
    inputs:
      keep_after_apply:
        description: "Skip destroy at the end (for debugging only — costs money)."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  # schedule:
  #   - cron: "0 6 1 * *"   # 1st of month, 06:00 UTC — enable after first successful manual run.

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.5"
  RG_NAME: archlucid-greenfield-${{ github.run_id }}
  REGION: eastus2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    name: terraform apply (greenfield)
    runs-on: ubuntu-latest
    outputs:
      api_host: ${{ steps.emit_outputs.outputs.api_host }}
      resource_group: ${{ steps.emit_outputs.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC, greenfield SP)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_GREENFIELD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_GREENFIELD_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_GREENFIELD_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate every infra stack (no apply)
        run: |
          set -eux
          for d in infra/terraform-pilot infra/terraform infra/terraform-storage infra/terraform-keyvault \
                   infra/terraform-monitoring infra/terraform-container-apps \
                   infra/terraform-sql-failover infra/terraform-otel-collector; do
            (cd "$d" && terraform init -backend=false && terraform validate)
          done

      - name: Create RG and optional Terraform apply (otel stack)
        env:
          AZURE_GREENFIELD_CAE_ID: ${{ secrets.AZURE_GREENFIELD_CAE_ID }}
          AZURE_GREENFIELD_APPINSIGHTS_CS: ${{ secrets.AZURE_GREENFIELD_APPINSIGHTS_CS }}
          ARCHLUCID_GREENFIELD_RG_NAME: ${{ env.RG_NAME }}
          ARCHLUCID_GREENFIELD_REGION: ${{ env.REGION }}
        run: |
          set -eux
          chmod +x scripts/saas-greenfield-apply.sh
          ./scripts/saas-greenfield-apply.sh

      - name: Emit outputs (smoke target + resource group)
        id: emit_outputs
        env:
          GREENFIELD_SMOKE_API_BASE_URL: ${{ secrets.GREENFIELD_SMOKE_API_BASE_URL }}
        run: |
          set -eux
          echo "resource_group=${{ env.RG_NAME }}" >> "$GITHUB_OUTPUT"
          if [ -n "${GREENFIELD_SMOKE_API_BASE_URL:-}" ]
          then
            u="${GREENFIELD_SMOKE_API_BASE_URL#https://}"
            u="${u#http://}"
            u="${u%%/*}"
            echo "api_host=$u" >> "$GITHUB_OUTPUT"
            echo "Emitting api_host for smoke: $u"
          else
            echo "api_host=" >> "$GITHUB_OUTPUT"
            echo "::notice::GREENFIELD_SMOKE_API_BASE_URL is unset; smoke / doctor will be skipped. Set the secret to exercise /health/ready and CLI doctor."
          fi

  smoke:
    name: smoke (/health/ready + archlucid doctor)
    runs-on: ubuntu-latest
    needs: apply
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Wait for /health/ready
        if: needs.apply.outputs.api_host != ''
        env:
          MAX_ATTEMPTS: 12
          SLEEP: 10
        run: |
          set -eux
          host=${{ needs.apply.outputs.api_host }}
          for n in $(seq 1 "$MAX_ATTEMPTS")
          do
            if curl -sf "https://$host/health/ready"
            then
              echo " health/ready OK on attempt $n"
              exit 0
            fi
            echo "Attempt $n failed; sleep ${SLEEP}s"
            sleep "$SLEEP"
          done
          echo "::error::Timed out waiting for https://$host/health/ready"
          exit 1

      - name: archlucid doctor (against deployed API)
        if: needs.apply.outputs.api_host != ''
        run: |
          set -eux
          dotnet run --project ArchLucid.Cli -- doctor --api "https://${{ needs.apply.outputs.api_host }}"

  destroy:
    name: resource group delete (cleanup)
    runs-on: ubuntu-latest
    needs: [apply, smoke]
    if: always() && inputs.keep_after_apply != 'true'
    steps:
      - name: Azure login (OIDC, greenfield SP)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_GREENFIELD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_GREENFIELD_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_GREENFIELD_SUBSCRIPTION_ID }}

      - name: Delete greenfield resource group
        run: |
          set -eux
          echo "Deleting ${{ needs.apply.outputs.resource_group }} …"
          az group delete --name "${{ needs.apply.outputs.resource_group }}" --yes --no-wait
          echo "Delete issued (async)."
