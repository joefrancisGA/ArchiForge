# Weekly mutation testing: Persistence (default stryker-config.json), Application, AgentRuntime — see docs/MUTATION_TESTING_STRYKER.md.
name: Stryker (scheduled)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stryker:
    name: "Stryker.NET — ${{ matrix.label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Persistence
            config: stryker-config.json
          - label: Application
            config: stryker-config.application.json
          - label: AgentRuntime
            config: stryker-config.agentruntime.json
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ArchiForge.sln

      - name: Restore local tools (dotnet-stryker)
        run: dotnet tool restore

      - name: Run Stryker
        run: dotnet dotnet-stryker -f ${{ matrix.config }}

      - name: Upload Stryker report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: stryker-report-${{ matrix.label }}
          path: StrykerOutput
