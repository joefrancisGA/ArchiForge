# Weekly mutation testing: Persistence, Application, AgentRuntime, Coordinator, Decisioning — see docs/MUTATION_TESTING_STRYKER.md and docs/TEST_STRUCTURE.md (Stryker configs table).
name: Stryker (scheduled)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stryker:
    name: "Stryker.NET — ${{ matrix.label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Persistence
            config: stryker-config.json
          - label: Application
            config: stryker-config.application.json
          - label: AgentRuntime
            config: stryker-config.agentruntime.json
          - label: Coordinator
            config: stryker-config.coordinator.json
          - label: Decisioning
            config: stryker-config.decisioning.json
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ArchLucid.sln

      - name: Restore local tools (dotnet-stryker)
        run: dotnet tool restore

      - name: Run Stryker
        run: dotnet dotnet-stryker -f ${{ matrix.config }} -s ArchLucid.sln

      - name: Assert mutation score vs committed baseline
        if: success()
        run: >
          python3 scripts/ci/assert_stryker_score_vs_baseline.py
          --baseline scripts/ci/stryker-baselines.json
          --label "${{ matrix.label }}"
          --stryker-root StrykerOutput
          --tolerance 0.10

      - name: Upload Stryker report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: stryker-report-${{ matrix.label }}
          path: StrykerOutput
