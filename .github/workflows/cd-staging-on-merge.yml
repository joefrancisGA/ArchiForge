# Optional: deploy to the GitHub **staging** environment after a **green** CI run on main/master.
# Enable by setting repository variable `AUTO_DEPLOY_STAGING_MERGE` to `true`.
# Configure the **staging** environment with the same secrets as manual CD (ACR, Container Apps, etc.).
# Optional **CONTAINER_APP_WORKER_NAME**: same image as API (`archlucid-api:<tag>`); Terraform sets `dotnet ArchLucid.Worker.dll` as the container command.
#
# Trigger: `workflow_run` on workflow named **CI** (see `.github/workflows/ci.yml` `name: CI`).
# Only runs when CI `conclusion` is success, event was **push**, head branch is main or master,
# and `head_repository` is this repo (not a fork PR whose source branch happens to be named main).
# This avoids deploying when only a PR branch passed CI, or when merge bypassed checks.
# Checkout uses `workflow_run.head_sha` so the images match the commit that CI validated.
name: CD staging on merge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  id-token: write
  contents: read
  # BuildKit type=gha cache (read/write) for docker/build-push-action — same scopes as CI smoke job.
  actions: write

concurrency:
  group: archlucid-cd-staging-merge
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-staging:
    if: |
      vars.AUTO_DEPLOY_STAGING_MERGE == 'true' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      github.event.workflow_run.head_repository.full_name == github.repository
    name: Deploy staging (merge)
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_DIR: ${{ secrets.TF_WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        run: |
          TAG="${{ vars.IMAGE_TAG }}"
          if [ -z "$TAG" ]; then TAG="${{ github.event.workflow_run.head_sha }}"; fi
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Detect ACR configuration
        id: acr
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          if [ -n "${ACR_LOGIN_SERVER:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ACR_LOGIN_SERVER not set — will skip image build/push."
          fi

      - name: Set up Docker Buildx
        if: steps.acr.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        if: steps.acr.outputs.configured == 'true'
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          REG_NAME="${ACR_NAME:-${ACR_LOGIN_SERVER%%.*}}"
          az acr login --name "$REG_NAME"

      - name: Build and push API image (BuildKit + GHA cache from CI smoke)
        if: steps.acr.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/archlucid-api:${{ env.IMAGE_TAG }}
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke
          cache-to: type=gha,scope=api-docker-smoke,mode=max

      - name: Build and push UI image (BuildKit + GHA cache from CI smoke)
        if: steps.acr.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./archlucid-ui
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/archlucid-ui:${{ env.IMAGE_TAG }}
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=ui-docker-smoke
          cache-to: type=gha,scope=ui-docker-smoke,mode=max

      - name: Record API revision before update
        id: api_rev_before
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REV=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Record worker revision before update
        id: worker_rev_before
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_WORKER_NAME: ${{ secrets.CONTAINER_APP_WORKER_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_WORKER_NAME:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REV=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --query "properties.latestRevisionName" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update Container Apps
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
          CONTAINER_APP_WORKER_NAME: ${{ secrets.CONTAINER_APP_WORKER_NAME }}
          CONTAINER_APP_UI_NAME: ${{ secrets.CONTAINER_APP_UI_NAME }}
        run: |
          if [ -z "${ACR_LOGIN_SERVER:-}" ] || [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            exit 0
          fi
          API_IMAGE="${ACR_LOGIN_SERVER}/archlucid-api:${IMAGE_TAG}"
          az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --image "$API_IMAGE"
          if [ -n "${CONTAINER_APP_WORKER_NAME:-}" ]; then
            az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --image "$API_IMAGE"
          fi
          if [ -n "${CONTAINER_APP_UI_NAME:-}" ]; then
            UI_IMAGE="${ACR_LOGIN_SERVER}/archlucid-ui:${IMAGE_TAG}"
            az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_UI_NAME" --image "$UI_IMAGE"
          fi

      - name: Post-deploy validation (health, readiness, OpenAPI, version)
        id: smoke_api
        env:
          SMOKE_TEST_BASE_URL: ${{ secrets.SMOKE_TEST_BASE_URL }}
          SMOKE_SYNTHETIC_PATH: ${{ vars.SMOKE_SYNTHETIC_PATH }}
          CD_POST_DEPLOY_MAX_ATTEMPTS: ${{ vars.CD_POST_DEPLOY_MAX_ATTEMPTS }}
          CD_POST_DEPLOY_RETRY_WAIT_SECONDS: ${{ vars.CD_POST_DEPLOY_RETRY_WAIT_SECONDS }}
        run: |
          if [ -z "${SMOKE_TEST_BASE_URL:-}" ]; then
            echo "SMOKE_TEST_BASE_URL not set — skipping post-deploy validation."
            exit 0
          fi
          chmod +x scripts/ci/cd-post-deploy-verify.sh
          bash scripts/ci/cd-post-deploy-verify.sh "${SMOKE_TEST_BASE_URL}" "${SMOKE_SYNTHETIC_PATH:-/version}"

      - name: Roll back API and worker on failed smoke
        if: ${{ failure() && steps.smoke_api.outcome == 'failure' }}
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
          CONTAINER_APP_WORKER_NAME: ${{ secrets.CONTAINER_APP_WORKER_NAME }}
          SMOKE_TEST_BASE_URL: ${{ secrets.SMOKE_TEST_BASE_URL }}
        run: |
          if [ "${{ vars.CD_ROLLBACK_ON_SMOKE_FAILURE }}" != "true" ]; then
            exit 0
          fi
          if [ -z "${SMOKE_TEST_BASE_URL:-}" ]; then
            exit 0
          fi
          if [ "${{ steps.api_rev_before.outputs.skip }}" != "true" ]; then
            BEFORE="${{ steps.api_rev_before.outputs.revision }}"
            AFTER=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
            if [ -n "$AFTER" ] && [ "$AFTER" != "$BEFORE" ]; then
              az containerapp revision deactivate -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --revision "$AFTER"
            fi
          fi
          if [ "${{ steps.worker_rev_before.outputs.skip }}" != "true" ]; then
            WBF="${{ steps.worker_rev_before.outputs.revision }}"
            WAF=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --query "properties.latestRevisionName" -o tsv)
            if [ -n "$WAF" ] && [ "$WAF" != "$WBF" ]; then
              az containerapp revision deactivate -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --revision "$WAF"
            fi
          fi

      - name: Notify webhook
        if: always()
        env:
          CD_NOTIFY_WEBHOOK_URL: ${{ secrets.CD_NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "${CD_NOTIFY_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"CD staging merge ${{ job.status }} — image ${IMAGE_TAG:-unknown} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$CD_NOTIFY_WEBHOOK_URL" || true
