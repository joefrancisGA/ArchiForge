# Full Playwright live-api suite off the PR critical path (schedule + manual).
# PRs still run `ui-e2e-live` + `ui-e2e-live-apikey` (subset) in ci.yml.

name: Live E2E nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read

jobs:
  live-e2e-nightly-developmentbypass:
    if: github.event.repository.fork == false
    name: "Nightly: live-api full (DevelopmentBypass)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archlucid-ui/package-lock.json

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      - name: Install UI deps & build Next (standalone)
        working-directory: archlucid-ui
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm ci
          npm run build

      - name: Create SQL catalog
        run: |
          set -e
          docker run --rm --network host --entrypoint /opt/mssql-tools18/bin/sqlcmd \
            mcr.microsoft.com/mssql/server:2022-latest \
            -S 127.0.0.1,1433 -U sa -P 'LocalTesting123!' -C \
            -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'ArchLucidLiveE2eNightly') CREATE DATABASE ArchLucidLiveE2eNightly;"

      - name: Start ArchLucid.Api (DevelopmentBypass)
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5128
          ConnectionStrings__ArchLucid: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchLucidLiveE2eNightly"
          ArchLucid__StorageProvider: Sql
          ArchLucidAuth__Mode: DevelopmentBypass
          Authentication__ApiKey__DevelopmentBypassAll: "true"
          AgentExecution__Mode: Simulator
          Cors__AllowedOrigins__0: "http://127.0.0.1:3000"
          Cors__AllowedOrigins__1: "http://localhost:3000"
        run: |
          set -e
          nohup dotnet run --no-build -c Release --project ArchLucid.Api/ArchLucid.Api.csproj > "${RUNNER_TEMP}/live-api-nightly-bypass.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/live-api-nightly-bypass.pid"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:5128/health/ready; then
              exit 0
            fi
            if [ "$i" -eq 90 ]; then
              tail -n 200 "${RUNNER_TEMP}/live-api-nightly-bypass.log" || true
              exit 1
            fi
            sleep 2
          done

      - name: Playwright full live suite
        working-directory: archlucid-ui
        env:
          CI: true
          LIVE_API_URL: http://127.0.0.1:5128
          LIVE_E2E_SKIP_NEXT_BUILD: "1"
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npx playwright install --with-deps chromium
          npx playwright test -c playwright.live.config.ts

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: nightly-live-e2e-developmentbypass-log
          path: ${{ runner.temp }}/live-api-nightly-bypass.log
          if-no-files-found: warn

  live-e2e-nightly-apikey:
    if: github.event.repository.fork == false
    name: "Nightly: live-api full (ApiKey)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archlucid-ui/package-lock.json

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      - name: Install UI deps & build Next (standalone)
        working-directory: archlucid-ui
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm ci
          npm run build

      - name: Create SQL catalog (ApiKey nightly)
        run: |
          set -e
          docker run --rm --network host --entrypoint /opt/mssql-tools18/bin/sqlcmd \
            mcr.microsoft.com/mssql/server:2022-latest \
            -S 127.0.0.1,1433 -U sa -P 'LocalTesting123!' -C \
            -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'ArchLucidLiveE2eNightlyApiKey') CREATE DATABASE ArchLucidLiveE2eNightlyApiKey;"

      - name: Start ArchLucid.Api (ApiKey)
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5128
          ConnectionStrings__ArchLucid: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchLucidLiveE2eNightlyApiKey"
          ArchLucid__StorageProvider: Sql
          ArchLucidAuth__Mode: ApiKey
          Authentication__ApiKey__Enabled: "true"
          Authentication__ApiKey__DevelopmentBypassAll: "false"
          Authentication__ApiKey__AdminKey: "nightly-apikey-admin"
          Authentication__ApiKey__ReadOnlyKey: "nightly-apikey-readonly"
          AgentExecution__Mode: Simulator
          Cors__AllowedOrigins__0: "http://127.0.0.1:3000"
          Cors__AllowedOrigins__1: "http://localhost:3000"
        run: |
          set -e
          nohup dotnet run --no-build -c Release --project ArchLucid.Api/ArchLucid.Api.csproj > "${RUNNER_TEMP}/live-api-nightly-apikey.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/live-api-nightly-apikey.pid"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:5128/health/ready; then
              exit 0
            fi
            if [ "$i" -eq 90 ]; then
              tail -n 200 "${RUNNER_TEMP}/live-api-nightly-apikey.log" || true
              exit 1
            fi
            sleep 2
          done

      - name: Playwright full live suite (ApiKey)
        working-directory: archlucid-ui
        env:
          CI: true
          LIVE_API_URL: http://127.0.0.1:5128
          LIVE_API_KEY: nightly-apikey-admin
          LIVE_API_KEY_READONLY: nightly-apikey-readonly
          LIVE_E2E_SKIP_NEXT_BUILD: "1"
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npx playwright install --with-deps chromium
          npx playwright test -c playwright.live.config.ts

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: nightly-live-e2e-apikey-log
          path: ${{ runner.temp }}/live-api-nightly-apikey.log
          if-no-files-found: warn
