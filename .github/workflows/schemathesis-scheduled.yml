# Weekly property-based API fuzzing from the OpenAPI document (Microsoft OpenAPI /v1).
# Runs the API in Development (anonymous OpenAPI + health), same pattern as zap-baseline-strict-scheduled.yml.
# Schemathesis: https://github.com/schemathesis/schemathesis — official Docker image only (no pip).
#
# CLI note: schemathesis/schemathesis:stable is v4+. Flags differ from v3:
#   --base-url → --url (-u)
#   --junit-xml → --report=junit + --report-junit-path (+ --report-dir)
#   --hypothesis-phases / --stateful → --phases (examples,fuzzing,stateful mirrors explicit+generate+stateful links)
# Request timeouts in v4 are seconds (10 / 30 below ≈ prior 10000 ms / 30000 ms intent).
#
# If "Upload Schemathesis JUnit" fails with insufficient token scope, add under permissions:
#   actions: write
name: "Security: Schemathesis API fuzz (scheduled)"

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  schemathesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        run: docker build -f ArchLucid.Api/Dockerfile -t archlucid-api:fuzz .

      - name: Run API and Schemathesis
        env:
          FUZZNET: fuzz-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          cleanup() {
            docker rm -f archlucid-fuzz-api 2>/dev/null || true
            docker network rm "$FUZZNET" 2>/dev/null || true
          }
          trap cleanup EXIT
          mkdir -p "$GITHUB_WORKSPACE/.schemathesis-out"
          chmod -R a+rwx "$GITHUB_WORKSPACE/.schemathesis-out"
          docker network create "$FUZZNET"
          docker run -d --name archlucid-fuzz-api --network "$FUZZNET" -p 8080:8080 \
            -e ASPNETCORE_URLS=http://+:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            archlucid-api:fuzz
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health/live; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API did not become healthy in time"
              docker logs archlucid-fuzz-api 2>&1 | tail -n 200 || true
              exit 1
            fi
            sleep 2
          done
          docker run --rm --network "$FUZZNET" \
            -v "$GITHUB_WORKSPACE/.schemathesis-out:/out" \
            schemathesis/schemathesis:stable \
            run http://archlucid-fuzz-api:8080/openapi/v1.json \
            --url http://archlucid-fuzz-api:8080 \
            --checks=all \
            --phases=examples,fuzzing,stateful \
            --report=junit \
            --report-dir=/out \
            --report-junit-path=/out/schemathesis-results.xml \
            --request-timeout 10 \
            --max-response-time 30

      - name: Upload Schemathesis JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: schemathesis-junit-${{ github.run_id }}
          path: .schemathesis-out/schemathesis-results.xml
          if-no-files-found: warn
