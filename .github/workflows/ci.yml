# Tiered CI (see docs/TEST_EXECUTION_MODEL.md):
#   Tier 0 — Secret scan (gitleaks; full clone)
#   Tier 1 — .NET fast core (fail-fast, no SQL) + CycloneDX SBOM artifact
#   Tier 2 — .NET full regression + SQL (runs after Tier 1 passes)
#   Tier 3a — Operator UI unit (Vitest / jsdom) + CycloneDX npm SBOM artifact
#   Tier 3b — Operator UI e2e (Playwright; browser-heavy)
#
# Re-run failed jobs from the Actions tab. Local equivalents: test-fast-core.*, test-full.*,
# archlucid-ui: npm test / npm run test:e2e.
#
# .NET coverage: each test job writes a collapsible report to the job summary; download
# coverage-report-*-html artifacts for browsable index.html (ReportGenerator).
# Also: Dependabot (.github/dependabot.yml), CodeQL (.github/workflows/codeql.yml),
# Docker build smoke + Trivy image scan, Terraform validate + Trivy config (Terraform misconfiguration;
# same audit class as tfsec/checkov for public exposure / encryption / IAM footguns),
# NuGet cache on setup-dotnet, PR sticky coverage comment.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Opt into Node 24 for JavaScript actions (GitHub default June 2026). Third-party actions still
# declaring node20 (e.g. gitleaks-action@2.3.9) run on 24 via this until they publish node24 builds.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: "Security: gitleaks (secret scan)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform-validate-private:
    name: "Terraform: validate private stack (no backend)"
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: terraform init (no backend)
        working-directory: infra/terraform-private
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra/terraform-private
        run: terraform validate

      - name: terraform fmt (check only)
        working-directory: infra/terraform-private
        run: terraform fmt -check -recursive

      - name: Trivy IaC (Terraform misconfigurations)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: infra/terraform-private
          severity: HIGH,CRITICAL
          exit-code: "1"

  terraform-validate-public-stacks:
    name: "Terraform: validate main / edge / entra (no backend)"
    needs: gitleaks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [infra/terraform, infra/terraform-edge, infra/terraform-entra, infra/terraform-container-apps, infra/terraform-storage, infra/terraform-monitoring, infra/terraform-sql-failover, infra/terraform-openai]
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: terraform init (no backend)
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: terraform fmt (check only)
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check -recursive

      - name: Trivy IaC (Terraform misconfigurations)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: ${{ matrix.directory }}
          severity: HIGH,CRITICAL
          exit-code: "1"

  dotnet-fast-core:
    name: ".NET: fast core (corset)"
    needs:
      - gitleaks
      - terraform-validate-private
      - terraform-validate-public-stacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore
        run: dotnet restore ArchLucid.sln

      - name: Vulnerable package audit
        run: dotnet list ArchLucid.sln package --vulnerable --include-transitive --format json

      - name: Build (Release)
        run: dotnet build ArchLucid.sln --no-restore -c Release /p:SourceRevisionId=$(git rev-parse HEAD)

      - name: Guard — audit matrix Core constant count
        run: |
          set -e
          CONST_COUNT=$(grep -c 'public const string' ArchLucid.Core/Audit/AuditEventTypes.cs)
          MARKER=$(grep -oP 'audit-core-const-count:\K[0-9]+' docs/AUDIT_COVERAGE_MATRIX.md | head -1)
          if [ -z "$MARKER" ]; then
            echo "::error::docs/AUDIT_COVERAGE_MATRIX.md missing audit-core-const-count marker"
            exit 1
          fi
          if [ "$CONST_COUNT" != "$MARKER" ]; then
            echo "::error::AuditEventTypes const count ($CONST_COUNT) != matrix marker ($MARKER). Update docs/AUDIT_COVERAGE_MATRIX.md."
            exit 1
          fi
          echo "Audit Core constants: $CONST_COUNT (matrix marker OK)."

      - name: Guard — unexpected archiforge string literals in C# (case-insensitive)
        run: |
          set +e
          grep -rni "archiforge" --include="*.cs" --exclude-dir=obj --exclude-dir=bin --exclude-dir=.git . > "${RUNNER_TEMP}/archiforge-cs-hits.txt"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::ArchLucid rename guard: grep failed while scanning .cs files (rc=$rc)"
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "ArchLucid rename guard: no case-insensitive 'archiforge' matches in .cs files."
            exit 0
          fi
          HITS=$(grep -v -F -f scripts/ci/archiforge-rename-allowlist.txt "${RUNNER_TEMP}/archiforge-cs-hits.txt" || true)
          if [ -n "$HITS" ]; then
            echo "::error::ArchLucid rename guard: unexpected 'archiforge' references in .cs files:"
            echo "$HITS"
            exit 1
          fi
          echo "ArchLucid rename guard: .cs hits are limited to allowlisted Phase 7 / compatibility patterns."

      - name: Guard — unexpected archiforge string literals in TS/TSX
        run: |
          set +e
          grep -rni "archiforge" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git . \
            > "${RUNNER_TEMP}/archiforge-ts-hits.txt"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::ArchLucid rename guard: grep failed while scanning TS/TSX files (rc=$rc)"
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "ArchLucid rename guard: no 'archiforge' matches in TS/TSX files."
            exit 0
          fi
          HITS=$(grep -v -F -f scripts/ci/archiforge-rename-allowlist-ts.txt "${RUNNER_TEMP}/archiforge-ts-hits.txt" || true)
          if [ -n "$HITS" ]; then
            echo "::error::ArchLucid rename guard: unexpected 'archiforge' references in TS/TSX files:"
            echo "$HITS"
            exit 1
          fi
          echo "ArchLucid rename guard: TS/TSX hits are limited to allowlisted Phase 7 / compatibility patterns."

      - name: Guard — no direct IIntegrationEventPublisher.PublishAsync bypasses
        run: |
          set +e
          grep -rn "\.PublishAsync(" --include="*.cs" --exclude-dir=obj --exclude-dir=bin --exclude-dir=.git . > "${RUNNER_TEMP}/pub-hits.txt"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::grep failed while scanning for .PublishAsync( (rc=$rc)"
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "No .PublishAsync( matches in .cs files."
            exit 0
          fi
          HITS=$(grep -v "Tests/" "${RUNNER_TEMP}/pub-hits.txt" \
            | grep -v "IntegrationEventPublishing.cs" \
            | grep -v "IntegrationEventOutboxProcessor.cs" \
            | grep -v "interface IIntegrationEventPublisher" \
            | grep -v "/// " \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Found direct IIntegrationEventPublisher.PublishAsync calls outside authorized locations:"
            echo "$HITS"
            echo ""
            echo "Use OutboxAwareIntegrationEventPublishing.TryPublishOrEnqueueAsync instead."
            exit 1
          fi

      - name: Guard — ArchitectureRuns write surface requires RunsAuthorityConvergence pragma
        run: python3 scripts/ci/assert_architecture_run_write_pragma.py

      - name: Generate .NET SBOM (CycloneDX)
        run: |
          dotnet tool install CycloneDX --tool-path "${RUNNER_TEMP}/cdx" --verbosity quiet
          CDX="${RUNNER_TEMP}/cdx/dotnet-cyclonedx"
          test -x "$CDX" || CDX="${RUNNER_TEMP}/cdx/dotnet-CycloneDX"
          "$CDX" ArchLucid.Api/ArchLucid.Api.csproj -o sbom-dotnet.json

      - uses: actions/upload-artifact@v6
        with:
          name: sbom-dotnet
          path: sbom-dotnet.json

      - name: Context ingestion DI guards
        run: python scripts/assert_context_ingestion_di_guards.py

      - name: List endpoint pagination audit
        run: python scripts/ci/assert_list_endpoint_pagination.py

      - name: CI Python scripts (pytest)
        run: |
          python3 -m pip install --quiet pytest
          cd scripts/ci && python3 -m pytest tests/ -v

      # Includes OpenApiContractSnapshotTests (Suite=Core): drift vs Contracts/openapi-v1.contract.snapshot.json fails the job.
      # ArchLucid.Api.Client regenerates from that snapshot on build (NSwag); Generated/ is gitignored.
      # coverage.runsettings: Cobertura format + Tier 5 excludes (generated/OpenAPI/CLI client); matches local merged reports.
      - name: Test — fast core
        run: dotnet test ArchLucid.sln --no-build -c Release --settings coverage.runsettings --filter "Suite=Core&Category!=Slow&Category!=Integration" --collect:"XPlat Code Coverage" --results-directory "${{ runner.temp }}/coverage-fast-core"

      - name: Merge coverage (HTML + GitHub job summary)
        if: success()
        run: |
          set -e
          dotnet tool restore
          OUT="${{ runner.temp }}/coverage-report-fast-core"
          dotnet reportgenerator \
            "-reports:${{ runner.temp }}/coverage-fast-core/**/coverage.cobertura.xml" \
            "-targetdir:${OUT}" \
            "-reporttypes:Html;TextSummary;MarkdownSummaryGithub" \
            -verbosity:Info
          cat "${OUT}/SummaryGithub.md" >> "${GITHUB_STEP_SUMMARY}"

      - uses: actions/upload-artifact@v6
        with:
          name: coverage-fast-core
          path: ${{ runner.temp }}/coverage-fast-core/**/coverage.cobertura.xml
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-report-fast-core-html
          path: ${{ runner.temp }}/coverage-report-fast-core/**
          if-no-files-found: warn

      - name: Test — finding-engine template (not in main solution)
        run: dotnet test templates/archlucid-finding-engine/ArchLucidFindingEngine.Tests/ArchLucidFindingEngine.Tests.csproj -c Release

  dotnet-full-regression:
    name: ".NET: full regression (SQL)"
    needs: dotnet-fast-core
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore
        run: dotnet restore ArchLucid.sln

      - name: Build (Release)
        run: dotnet build ArchLucid.sln --no-restore -c Release /p:SourceRevisionId=$(git rev-parse HEAD)

      - name: Test — full solution
        env:
          ARCHLUCID_SQL_TEST: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchLucidPersistenceTests"
        run: dotnet test ArchLucid.sln --no-build -c Release --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory "${{ runner.temp }}/coverage-full"

      - name: Merge coverage (HTML + GitHub job summary)
        if: success()
        run: |
          set -e
          dotnet tool restore
          OUT="${{ runner.temp }}/coverage-report-full"
          dotnet reportgenerator \
            "-reports:${{ runner.temp }}/coverage-full/**/coverage.cobertura.xml" \
            "-targetdir:${OUT}" \
            "-reporttypes:Html;TextSummary;MarkdownSummaryGithub;Cobertura" \
            -verbosity:Info
          cat "${OUT}/SummaryGithub.md" >> "${GITHUB_STEP_SUMMARY}"
          head -n 50 "${OUT}/Summary.txt" | grep -E 'Line coverage:|Branch coverage:' | sed 's/^[[:space:]]*//' > "${{ runner.temp }}/coverage-metrics.txt"

      - name: Enforce merged coverage gates (line 70%, branch 50%, product packages 40% line)
        if: success()
        run: >
          python3 scripts/ci/assert_merged_line_coverage_min.py
          "${{ runner.temp }}/coverage-report-full/Cobertura.xml" 70
          --min-branch-pct 50
          --min-package-line-pct 40

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-metrics
          path: ${{ runner.temp }}/coverage-metrics.txt
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-merged-cobertura
          path: ${{ runner.temp }}/coverage-report-full/Cobertura.xml
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        with:
          name: coverage-full-regression
          path: ${{ runner.temp }}/coverage-full/**/coverage.cobertura.xml
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-report-full-regression-html
          path: ${{ runner.temp }}/coverage-report-full/**
          if-no-files-found: warn

  publish-api-client-nuget:
    name: "NuGet: pack & push API client (main/master)"
    needs: dotnet-full-regression
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore
        run: dotnet restore ArchLucid.Api.Client/ArchLucid.Api.Client.csproj

      - name: Pack ArchLucid.Api.Client
        run: |
          dotnet pack ArchLucid.Api.Client/ArchLucid.Api.Client.csproj \
            --no-restore \
            -c Release \
            -o "${RUNNER_TEMP}/nuget" \
            /p:SourceRevisionId=$(git rev-parse HEAD) \
            /p:ArchLucidApiClientPackageVersion=1.0.${{ github.run_number }}

      - uses: actions/upload-artifact@v6
        with:
          name: archlucid-api-client-nupkg-ci
          path: ${{ runner.temp }}/nuget/*.nupkg

      - name: Push (NuGet.org)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "NUGET_API_KEY is not set; skipping NuGet push (artifact upload still contains the .nupkg)."
            exit 0
          fi
          dotnet nuget push "${RUNNER_TEMP}/nuget/"*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  coverage-pr-comment:
    # Runs on every green full regression so the check can be required on the default branch;
    # comment steps are gated to same-repo pull_request only.
    name: "PR: coverage comment"
    needs: dotnet-full-regression
    if: needs.dotnet-full-regression.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Decide whether to post PR comment
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "post=false" >> "$GITHUB_OUTPUT"
            echo "Not a pull request; skipping sticky comment."
          elif [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "post=false" >> "$GITHUB_OUTPUT"
            echo "Fork PR; skipping sticky comment (token scope)."
          else
            echo "post=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.gate.outputs.post == 'true'

      - uses: actions/download-artifact@v6
        if: steps.gate.outputs.post == 'true'
        with:
          name: coverage-metrics
          path: head-metrics

      - uses: actions/download-artifact@v6
        continue-on-error: true
        if: steps.gate.outputs.post == 'true'
        with:
          name: coverage-merged-cobertura
          path: head-cobertura

      - name: Download base branch coverage metrics (optional)
        continue-on-error: true
        if: steps.gate.outputs.post == 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ github.token }}
          workflow: ci.yml
          workflow_conclusion: success
          branch: ${{ github.event.pull_request.base.ref }}
          name: coverage-metrics
          path: base-metrics
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Build comment body
        id: cov
        if: steps.gate.outputs.post == 'true'
        env:
          HEAD_FILE: head-metrics/coverage-metrics.txt
          BASE_FILE: base-metrics/coverage-metrics.txt
          COBERTURA_FILE: head-cobertura/Cobertura.xml
          ANNOTATIONS_FILE: head-metrics/coverage-annotations.txt
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/ci/build_coverage_pr_comment.py
          if [ -f head-metrics/coverage-annotations.txt ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              echo "::warning::$line"
            done < head-metrics/coverage-annotations.txt
          fi

      - uses: marocchino/sticky-pull-request-comment@v3
        if: steps.gate.outputs.post == 'true'
        with:
          header: archlucid-coverage
          recreate: true
          number: ${{ github.event.pull_request.number }}
          message: ${{ steps.cov.outputs.body }}

  docker-build-smoke:
    name: "Containers: Docker build smoke"
    needs: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # cache-from always (fork PRs may read base-branch cache). cache-to only on push to main/master
      # — fork PR workflows get a read-only token and fail if we always pass cache-to.
      actions: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to write BuildKit GHA cache
        id: gha_cache_write
        run: |
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; }; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build API image (read/write GHA cache)
        if: steps.gha_cache_write.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: archlucid-api:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke
          cache-to: type=gha,scope=api-docker-smoke,mode=max

      - name: Build API image (read-only GHA cache)
        if: steps.gha_cache_write.outputs.enabled != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: archlucid-api:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke

      - name: Build Operator UI image (read/write GHA cache)
        if: steps.gha_cache_write.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./archlucid-ui
          tags: archlucid-ui:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=ui-docker-smoke
          cache-to: type=gha,scope=ui-docker-smoke,mode=max

      - name: Build Operator UI image (read-only GHA cache)
        if: steps.gha_cache_write.outputs.enabled != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./archlucid-ui
          tags: archlucid-ui:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=ui-docker-smoke

      - name: Trivy scan API image (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: archlucid-api:ci
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Trivy scan Operator UI image (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: archlucid-ui:ci
          severity: CRITICAL,HIGH
          exit-code: "1"

  ui-unit:
    name: "Operator UI: unit (Vitest)"
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archlucid-ui/package-lock.json

      - name: Install & run unit tests
        working-directory: archlucid-ui
        run: |
          npm ci
          npm run test

      - name: Generate npm SBOM (CycloneDX)
        working-directory: archlucid-ui
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --output-file sbom-npm.json --ignore-npm-errors

      - uses: actions/upload-artifact@v6
        with:
          name: sbom-npm
          path: archlucid-ui/sbom-npm.json

  ui-e2e-smoke:
    name: "Operator UI: e2e smoke (Playwright)"
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archlucid-ui/package-lock.json

      - name: Install dependencies & run Playwright smoke
        working-directory: archlucid-ui
        env:
          CI: true
          # Next.js production build in webServer can OOM on default ubuntu-latest Node heap.
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test

  dotnet-benchmark-regression:
    name: ".NET: benchmark regression (short job)"
    needs: dotnet-fast-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore & build benchmarks
        run: |
          dotnet restore ArchLucid.Benchmarks/ArchLucid.Benchmarks.csproj
          dotnet build --no-restore -c Release ArchLucid.Benchmarks/ArchLucid.Benchmarks.csproj

      - name: Run BenchmarkDotNet (short) and compare baseline
        env:
          BENCH_ART: ${{ runner.temp }}/bench-artifacts
        run: |
          set -e
          dotnet run -c Release --no-build --project ArchLucid.Benchmarks -- \
            --filter "*" -j short --exporters json --artifacts "$BENCH_ART"
          python3 scripts/ci/compare_benchmark_baseline.py \
            --baseline ci/benchmark-baseline.json \
            --results "$BENCH_ART/results"

  security-zap-api-baseline:
    name: "Security: OWASP ZAP baseline (API container)"
    needs: docker-build-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (reuse GHA cache from docker-build-smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: archlucid-api:zap
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke

      - name: Run API on Docker network and ZAP baseline
        env:
          ZNET: zapci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -e
          cleanup() {
            docker rm -f archlucid-zap-api 2>/dev/null || true
            docker network rm "$ZNET" 2>/dev/null || true
          }
          trap cleanup EXIT
          docker network create "$ZNET"
          # zap-baseline.py writes /zap/wrk/zap.yaml; the image user often cannot write the image's /zap/wrk.
          ZAP_WRK="${RUNNER_TEMP:-/tmp}/zap-wrk-${ZNET}"
          mkdir -p "$ZAP_WRK"
          # ZAP runs as uid 1000 (zap); RUNNER_TEMP is often owned by uid 1001 (runner) → Permission denied without this.
          chmod -R a+rwx "$ZAP_WRK"
          docker run -d --name archlucid-zap-api --network "$ZNET" -p 8080:8080 \
            -e ASPNETCORE_URLS=http://+:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            archlucid-api:zap
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health/live; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API did not become healthy in time"
              exit 1
            fi
            sleep 2
          done
          docker run --rm --network "$ZNET" \
            -v "$ZAP_WRK:/zap/wrk" \
            -v "$GITHUB_WORKSPACE/infra/zap:/zap/wrk/config:ro" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://archlucid-zap-api:8080 -I -c config/baseline-pr.tsv
