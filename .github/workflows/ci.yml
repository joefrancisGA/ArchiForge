# Tiered CI (see docs/TEST_EXECUTION_MODEL.md):
#   Tier 0 — Secret scan (gitleaks; full clone)
#   Tier 1 — .NET fast core (fail-fast, no SQL) + CycloneDX SBOM artifact
#   Tier 1.5 — .NET greenfield SQL boot (empty catalog; API process + /health/ready; after Tier 1)
#   Tier 2 — .NET full regression + SQL (runs after Tier 1 passes)
#   Tier 2b — Simmy chaos (after Tier 2; no SQL)
#   Tier 2c — k6: operator-path API smoke after full regression (native k6; merge-blocking) + k6 CI smoke read+write (after Tier 1)
#   Tier 3a — Operator UI unit (Vitest / jsdom) + CycloneDX npm SBOM artifact
#   Tier 3b — Operator UI e2e (Playwright; browser-heavy)
#
# Re-run failed jobs from the Actions tab. Local equivalents: test-fast-core.*, test-full.*,
# archlucid-ui: npm test / npm run test:axe-components / Playwright (default live config; mock via playwright.mock.config.ts).
#
# .NET coverage: each test job writes a collapsible report to the job summary; download
# coverage-report-*-html artifacts for browsable index.html (ReportGenerator).
# Also: Dependabot (.github/dependabot.yml), CodeQL (.github/workflows/codeql.yml),
# Docker build smoke + Trivy image scan, Terraform validate + Trivy config (Terraform misconfiguration;
# same audit class as tfsec/checkov for public exposure / encryption / IAM footguns),
# NuGet cache on setup-dotnet, PR sticky coverage comment.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Opt into Node 24 for JavaScript actions (GitHub default June 2026). Docker Buildx / build-push use
# setup-buildx-action@v4 + build-push-action@v7 (Node 24 runtimes; runner ≥ v2.327.1). Other third-party
# actions may still declare node20 until republished. Tier-0 secret scan uses
# gacts/gitleaks (node24-native) instead of gitleaks/gitleaks-action to avoid Node 20 deprecation noise.
# Trivy: pin `aquasecurity/trivy-action` to a **commit** (not tag `v0.35.0`) so the composite bundles
# `setup-trivy@v0.2.6` (install.sh `-c setup-trivy`). Tag v0.35.0 still references setup-trivy@e6c2c5e, whose
# install path fails for some newer Trivy tags right after "found version … Linux/64bit". Ref: trivy-action master
# action.yaml vs tag v0.35.0. Set `cache: false` on each step to skip nested actions/cache noise where needed.
# Pin `version` on each step to a release `setup-trivy` can install (same default as `trivy-action@876cf04` action.yaml).
# v0.70.0 failed on runners: `aquasecurity/trivy crit unable to find 'v0.70.0'` during setup-trivy binary install.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: "Security: gitleaks (secret scan)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gacts/gitleaks@v1.3.2
        with:
          config-path: .gitleaks.toml

  docs-root-size:
    name: "Docs: root markdown count guard (≤32)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert docs root .md count
        run: python scripts/ci/assert_docs_root_size.py

  docs-navigator-links:
    name: "Docs: NAVIGATOR.md link targets exist"
    needs:
      - gitleaks
      - docs-root-size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert docs/NAVIGATOR.md links resolve
        run: python scripts/ci/assert_navigator_links_valid.py

  two-layer-naming-lint:
    name: "Docs: Pilot/Operate buyer naming lint"
    needs:
      - gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert no legacy buyer layer labels under docs/
        run: python scripts/ci/assert_two_layer_naming.py

      - name: two-layer naming guard unit tests
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_two_layer_naming.py"

  integrations-node-ado-pipeline-tasks:
    name: "Integrations: Azure Pipelines YAML scripts (node --test)"
    needs: gitleaks
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: node --test (ADO pipeline task parity)
        run: |
          node --test integrations/azure-devops-task-manifest-delta-pr-comment/post-pr-thread.test.mjs
          node --test integrations/azure-devops-task-manifest-delta/job-summary.test.mjs

  doc-markdown-links:
    name: "Docs: markdown link integrity"
    needs:
      - gitleaks
      - docs-root-size
      - docs-navigator-links
      - two-layer-naming-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archlucid-ui/package-lock.json

      - name: Install archlucid-ui npm deps (marketing accessibility sync guard)
        run: npm ci
        working-directory: archlucid-ui

      - name: Check relative markdown links
        run: python scripts/ci/check_md_links.py

      - name: Contributor one-page doc line budget (≤80 lines)
        run: python scripts/ci/assert_contributor_on_one_page_size.py

      - name: Contributor one-page line budget unit tests
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_contributor_on_one_page_size.py"

      - name: Pen test remediation tracker hygiene
        run: python scripts/ci/assert_pen_test_remediation_no_stale.py

      - name: Audit coverage matrix vs AuditEventTypes (names + count marker)
        run: python scripts/ci/assert_audit_const_count.py

      - name: Audit matrix guard unit tests
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_audit_const_count.py"

      - name: Integration recipe CloudEvent types vs catalog
        run: python scripts/ci/check_integration_recipes_link_alignment.py

      - name: Integration recipe alignment guard unit tests
        run: python -m unittest discover -s scripts/ci/tests -p "test_check_integration_recipes_link_alignment.py"

      - name: READ_THIS_FIRST.md — relative targets exist
        run: python scripts/ci/check_read_this_first_links.py

      - name: Check trust center doc links
        run: python scripts/ci/check_trust_center_links.py

      - name: Marketing accessibility page vs ACCESSIBILITY.md (TS parser parity)
        run: python scripts/ci/assert_marketing_accessibility_in_sync.py

      - name: Buyer first-30-minutes path — vertical picker + q35 prose guard
        run: python scripts/ci/assert_buyer_first_30_minutes_in_sync.py

      - name: Buyer first-30-minutes guard self-test
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_buyer_first_30_minutes_in_sync.py"

      - name: BillingProductionSafetyRules — sk_live_ + Marketplace landing + GA offer-id checks shipped
        run: python scripts/ci/assert_billing_safety_rules_shipped.py

      - name: BillingProductionSafetyRules guard self-test
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_billing_safety_rules_shipped.py"

      - name: Golden cohort kill-switch shipped (Q15-conditional rule — warn 80% / kill 95%)
        run: python scripts/ci/assert_golden_cohort_kill_switch_present.py

      - name: Golden cohort kill-switch guard self-test
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_golden_cohort_kill_switch_present.py"

      - name: Golden cohort budget-probe threshold-parsing unit tests (Improvement 11)
        run: |
          cd scripts/ci
          python -m unittest test_golden_cohort_budget_probe

      - name: "Brand-category seam — rebrand workstream guard (WARN mode through PR-6, flips to FAIL in PR-7)"
        run: python scripts/ci/assert_brand_category_seam.py

      - name: Brand-category seam guard self-test
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_brand_category_seam.py"

      - name: "Advisory — PR B tracker vs ADR 0029 checklist (warn-only; strict via ARCHLUCID_PR_B_TRACKER_STRICT)"
        continue-on-error: true
        run: python scripts/ci/assert_pr_b_tracker_in_sync.py

      - name: PR B tracker sync guard unit tests
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_pr_b_tracker_in_sync.py"

      - name: ADR 0030 authority projection known-empty JSON guard
        run: python scripts/ci/assert_authority_projection_known_empty.py

      - name: ADR 0030 authority projection known-empty guard unit tests
        run: python -m unittest discover -s scripts/ci/tests -p "test_assert_authority_projection_known_empty.py"

      - name: Golden cohort baseline locked — no placeholder SHAs
        env:
          ARCHLUCID_GOLDEN_COHORT_BASELINE_LOCKED: "true"
        run: python scripts/ci/assert_golden_cohort_baseline_locked.py

      - name: Golden cohort baseline locked guard unit tests
        run: |
          cd scripts/ci
          python -m unittest test_assert_golden_cohort_baseline_locked

      - name: Procurement pack canonical sources (dry-run)
        run: python scripts/ci/assert_procurement_pack_buildable.py

      - name: "Advisory — game-day closing report vs calendar (strict after second logged run)"
        continue-on-error: true
        # Today: warn-only. After two completed quarterly close-outs, remove continue-on-error
        # so a missed past calendar date fails merge (see docs/quality/game-day-log/README.md).
        run: python scripts/ci/assert_game_day_log_recent.py

      - name: Game-day log guard unit tests
        run: |
          cd scripts/ci
          python -m unittest test_assert_game_day_log_recent

      - name: Synthetic aggregate ROI bulletin sample guards
        run: python scripts/ci/check_synthetic_roi_bulletin_sample.py

      - name: Doc scope header
        # Merge-blocking: every active ``docs/**/*.md`` (except ``docs/archive/``) must open with
        # ``> **Scope:**`` on the first non-empty line. README.md uses ``<!-- **Scope:** ... -->``.
        # See ``scripts/ci/check_doc_scope_header.py`` and ``scripts/ci/backfill_doc_scope_headers.py``.
        run: python scripts/ci/check_doc_scope_header.py

      - name: Doc scope header check unit tests
        run: |
          cd scripts/ci
          python -m unittest test_check_doc_scope_header test_backfill_doc_scope_headers

      - name: Architecture poster line budget (Prompt 12)
        run: python scripts/ci/check_doc_size_budget.py --max-lines 500 docs/ARCHITECTURE_ON_ONE_PAGE.md

      - name: Five-document onboarding spine line budget (600 lines each)
        run: python scripts/ci/check_onboarding_spine_line_budget.py --max-lines 600

      - name: Doc size budget guard unit tests
        run: |
          cd scripts/ci
          python -m unittest test_check_doc_size_budget

      - name: Coordinator reference ceiling (ADR 0021 strangler drift)
        run: |
          python -m unittest discover -s scripts/ci/tests -p "test_assert_coordinator_reference_ceiling.py"
          python scripts/ci/assert_coordinator_reference_ceiling.py

      - name: Procurement pack ZIP (deterministic docs bundle)
        run: bash scripts/build_procurement_pack.sh

      - name: Mermaid syntax (mermaid-cli when available)
        run: python scripts/ci/check_mermaid_syntax.py docs/ARCHITECTURE_ON_ONE_PAGE.md

      - name: Runbook freshness (informational)
        run: python scripts/ci/check_doc_freshness.py

      - name: Tenant inventory tables vs master DDL
        run: python scripts/ci/assert_tenant_inventory_tables_in_archlucid_sql.py

      - name: Pricing single-source-of-truth guard
        run: python scripts/ci/check_pricing_single_source.py

      - name: Worked-example ROI PDF freshness (warn-only; set WORKED_EXAMPLE_ROI_FRESHNESS_FAIL=1 to enforce)
        run: python scripts/ci/check_worked_example_roi_freshness.py

      - name: README opener link density (max 12 links above first <details>)
        run: python scripts/ci/check_readme_density.py

      - name: README opener link density guard unit tests
        run: |
          cd scripts/ci
          python -m unittest test_check_readme_density -q

      - name: Marketplace pricing tier alignment vs PRICING_PHILOSOPHY
        run: python scripts/ci/assert_marketplace_pricing_alignment.py

      - name: "/why comparison rows in sync (TS inline section vs C# PDF builder)"
        # PENDING_QUESTIONS.md item 31, resolved 2026-04-21 (ship both PDF and inline section,
        # with a CI sync check). Fails if archlucid-ui/src/marketing/why-archlucid-comparison.ts
        # and ArchLucid.Application/Pilots/WhyArchLucidPackBuilder.cs diverge on any of the
        # five differentiation-row fields (claim, evidence, baseline, citation, narrative).
        run: python scripts/ci/check_why_archlucid_comparison_sync.py

      - name: "/why front-door hard table — markdown vs why-comparison.ts row order"
        run: python scripts/ci/check_why_table_alignment.py

      - name: "/why differentiation rows — non-empty evidence fields"
        run: python scripts/ci/assert_why_rows_have_evidence.py

      - name: Mutating controller actions — audit LogAsync guard
        run: python scripts/ci/assert_controller_mutations_have_audit.py

      - name: Controller audit guard unit tests
        run: |
          cd scripts/ci
          python -m unittest test_assert_controller_mutations_have_audit -q

      - name: "PGP public key — validate armored key when present; warn when pending"
        continue-on-error: true
        # Missing key: script exits 0 (stderr notice). Invalid committed key: exits 1 — then fix or set merge-blocking.
        run: python scripts/ci/assert_pgp_key_present.py

      - name: PGP key presence + golden cohort budget probe unit tests
        run: |
          python -m pip install --upgrade pip
          pip install requests
          cd scripts/ci
          python -m unittest test_assert_pgp_key_present
          python -m unittest test_golden_cohort_budget_probe
          python -m unittest test_golden_cohort_usage_ledger

      - name: Guard — no legacy ArchiForge.* workspace directories
        run: python scripts/ci/check_no_legacy_archiforge_dirs.py

      - name: Guard — legacy ArchiForge.* directory check unit tests
        run: |
          cd scripts/ci
          python -m unittest test_check_no_legacy_archiforge_dirs

      - name: Guard — concept vocabulary (docs/CONCEPTS.md § 1)
        run: python scripts/ci/check_concept_vocabulary.py

      - name: Guard — concept vocabulary check unit tests
        run: |
          cd scripts/ci
          python -m unittest test_check_concept_vocabulary

      - name: Guard — reference-customer status (non-blocking until first Published row)
        # Surfaces as warn-only while no row has Status: Published. The auto-flip
        # step below makes regression (removing or downgrading a Published row)
        # merge-blocking the moment the first row reaches Published — no manual
        # CI edit required at re-rate time. See docs/go-to-market/PRICING_PHILOSOPHY.md § 5.4.
        id: refcust-warn
        continue-on-error: true
        run: python scripts/ci/check_reference_customer_status.py docs/go-to-market/reference-customers/README.md

      - name: "Guard — reference-customer status (auto-flip: strict once any Published row exists)"
        # Auto-flip semantics:
        #   - refcust-warn outcome == 'success'  =>  at least one Status: Published row exists today.
        #   - From that day on, this step re-runs the same check WITHOUT continue-on-error,
        #     so any regression (downgrade or removal of the only Published row) fails CI.
        #   - While zero Published rows exist, this step is skipped and the warn step is the only signal.
        # See docs/archive/quality/QUALITY_IMPROVEMENT_DECISIONS_2026_04_20.md (Improvement 1, ref-customer guard).
        if: steps.refcust-warn.outcome == 'success'
        run: python scripts/ci/check_reference_customer_status.py docs/go-to-market/reference-customers/README.md

      - name: Guard — reference-customer status check unit tests
        run: |
          cd scripts/ci
          python -m unittest test_check_reference_customer_status

      - name: AuditEvents read path — no NOLOCK hint
        run: python scripts/ci/assert_no_audit_events_nolock.py

  terraform-assert-no-archiforge-in-tf:
    name: "Terraform: no legacy archiforge token in .tf"
    needs:
      - gitleaks
      - doc-markdown-links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fail if infra/**/*.tf contains archiforge
        run: |
          set -euo pipefail
          if grep -rq 'archiforge' --include='*.tf' infra/; then
            echo "::error::Legacy token 'archiforge' must not appear in Terraform (.tf) sources — see docs/ARCHLUCID_RENAME_CHECKLIST.md Phase 7.5"
            grep -rn 'archiforge' --include='*.tf' infra/ || true
            exit 1
          fi
          echo "OK: no archiforge in infra/**/*.tf"

  terraform-validate-private:
    name: "Terraform: validate private stack (no backend)"
    needs:
      - gitleaks
      - doc-markdown-links
      - terraform-assert-no-archiforge-in-tf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: terraform init (no backend)
        working-directory: infra/terraform-private
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra/terraform-private
        run: terraform validate

      - name: terraform fmt (check only)
        working-directory: infra/terraform-private
        run: terraform fmt -check -recursive

      - name: Trivy IaC (Terraform misconfigurations)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # embeds setup-trivy@v0.2.6; tag v0.35.0 does not
        with:
          version: v0.69.3
          scan-type: config
          scan-ref: infra/terraform-private
          severity: HIGH,CRITICAL
          exit-code: "1"
          cache: false

  terraform-validate-public-stacks:
    name: "Terraform: validate main / edge / entra (no backend)"
    needs:
      - gitleaks
      - doc-markdown-links
      - terraform-assert-no-archiforge-in-tf
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [infra/terraform, infra/terraform-edge, infra/terraform-entra, infra/terraform-container-apps, infra/terraform-storage, infra/terraform-monitoring, infra/terraform-sql-failover, infra/terraform-openai, infra/terraform-keyvault, infra/terraform-orchestrator, infra/terraform-logicapps, infra/terraform-servicebus, infra/terraform-pilot]
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: terraform init (no backend)
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: terraform fmt (check only)
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check -recursive

      - name: Trivy IaC (Terraform misconfigurations)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # embeds setup-trivy@v0.2.6; tag v0.35.0 does not
        with:
          version: v0.69.3
          scan-type: config
          scan-ref: ${{ matrix.directory }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          cache: false

  dotnet-fast-core:
    name: ".NET: fast core (corset)"
    needs:
      - gitleaks
      - doc-markdown-links
      - terraform-validate-private
      - terraform-validate-public-stacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore
        run: dotnet restore ArchLucid.sln

      - name: Vulnerable package audit
        run: dotnet list ArchLucid.sln package --vulnerable --include-transitive --format json

      - name: Build (Release)
        run: dotnet build ArchLucid.sln --no-restore -c Release /p:SourceRevisionId=$(git rev-parse HEAD)

      - name: Guard — audit coverage matrix vs AuditEventTypes (names + marker)
        run: python scripts/ci/assert_audit_const_count.py

      - name: coordinator parity probe (Python unit tests)
        run: python3 scripts/ci/test_coordinator_parity_probe.py

      - name: Guard — migration rollback scripts (latest ten)
        run: python3 scripts/ci/assert_rollback_scripts_exist.py

      - name: Guard — migration numbering (warn-only)
        # Non-blocking: surfaces duplicate ###_ prefixes (DbUp orders lexically; ties are silent).
        # Flip to blocking after the historical 035_/096_ duplicates are renumbered (gated on
        # confirming no production catalog has applied them — see
        # docs/archive/quality/QUALITY_IMPROVEMENT_DECISIONS_2026_04_20.md, question 5.1).
        continue-on-error: true
        run: python3 scripts/ci/check_migration_numbering.py

      - name: Guard — legacy configuration sunset date
        run: python3 scripts/ci/assert_legacy_config_sunset_not_passed.py

      - name: Guard — golden agent reference JSON fixtures
        run: python3 scripts/ci/assert_agent_reference_baselines.py

      - name: Guard — unexpected archiforge string literals in C# (case-insensitive)
        run: |
          set +e
          grep -rni "archiforge" --include="*.cs" --exclude-dir=obj --exclude-dir=bin --exclude-dir=.git . > "${RUNNER_TEMP}/archiforge-cs-hits.txt"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::ArchLucid rename guard: grep failed while scanning .cs files (rc=$rc)"
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "ArchLucid rename guard: no case-insensitive 'archiforge' matches in .cs files."
            exit 0
          fi
          echo "::error::ArchLucid rename guard: unexpected 'archiforge' references in .cs files:"
          cat "${RUNNER_TEMP}/archiforge-cs-hits.txt"
          exit 1

      - name: Guard — unexpected archiforge string literals in TS/TSX
        run: |
          set +e
          grep -rni "archiforge" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git . \
            > "${RUNNER_TEMP}/archiforge-ts-hits.txt"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::ArchLucid rename guard: grep failed while scanning TS/TSX files (rc=$rc)"
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "ArchLucid rename guard: no 'archiforge' matches in TS/TSX files."
            exit 0
          fi
          echo "::error::ArchLucid rename guard: unexpected 'archiforge' references in TS/TSX files:"
          cat "${RUNNER_TEMP}/archiforge-ts-hits.txt"
          exit 1

      - name: Guard — archiforge in marketing UI and terraform-edge (narrow paths)
        run: |
          set +e
          grep -rni "archiforge" \
            --include="*.ts" --include="*.tsx" --include="*.tf" \
            'archlucid-ui/src/app/(marketing)' infra/terraform-edge \
            > "${RUNNER_TEMP}/archiforge-marketing-edge.txt"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::ArchLucid rename guard: grep failed while scanning marketing UI / terraform-edge (rc=$rc)"
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "ArchLucid rename guard: no 'archiforge' in archlucid-ui/src/app/(marketing) or infra/terraform-edge."
            exit 0
          fi
          echo "::error::ArchLucid rename guard: unexpected 'archiforge' in marketing UI or terraform-edge:"
          cat "${RUNNER_TEMP}/archiforge-marketing-edge.txt"
          exit 1

      - name: Guard — no direct IIntegrationEventPublisher.PublishAsync bypasses
        run: |
          set +e
          grep -rn "\.PublishAsync(" --include="*.cs" --exclude-dir=obj --exclude-dir=bin --exclude-dir=.git . > "${RUNNER_TEMP}/pub-hits.txt"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::grep failed while scanning for .PublishAsync( (rc=$rc)"
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "No .PublishAsync( matches in .cs files."
            exit 0
          fi
          HITS=$(grep -v "Tests/" "${RUNNER_TEMP}/pub-hits.txt" \
            | grep -v "IntegrationEventPublishing.cs" \
            | grep -v "IntegrationEventOutboxProcessor.cs" \
            | grep -v "interface IIntegrationEventPublisher" \
            | grep -v "/// " \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Found direct IIntegrationEventPublisher.PublishAsync calls outside authorized locations:"
            echo "$HITS"
            echo ""
            echo "Use OutboxAwareIntegrationEventPublishing.TryPublishOrEnqueueAsync instead."
            exit 1
          fi

      - name: Generate .NET SBOM (CycloneDX)
        run: |
          dotnet tool install CycloneDX --tool-path "${RUNNER_TEMP}/cdx" --verbosity quiet
          CDX="${RUNNER_TEMP}/cdx/dotnet-cyclonedx"
          test -x "$CDX" || CDX="${RUNNER_TEMP}/cdx/dotnet-CycloneDX"
          "$CDX" ArchLucid.Api/ArchLucid.Api.csproj -o sbom-dotnet.json

      - uses: actions/upload-artifact@v6
        with:
          name: sbom-dotnet
          path: sbom-dotnet.json

      - name: Context ingestion DI guards
        run: python scripts/assert_context_ingestion_di_guards.py

      - name: List endpoint pagination audit
        run: python scripts/ci/assert_list_endpoint_pagination.py

      - name: CI Python scripts (pytest)
        run: |
          python3 -m pip install --quiet pytest
          cd scripts/ci && python3 -m pytest tests/ -v

      - name: V1 traceability matrix (docs vs repo paths)
        run: python3 scripts/ci/assert_traceability_coverage.py

      - name: V1 RTM dotnet filter tokens resolve
        run: python3 scripts/ci/assert_rtm_test_filters_resolve.py

      - name: Agent eval dataset manifest (shape)
        run: python3 scripts/ci/eval_agent_quality.py --manifest-only

      - name: Prompt injection eval datasets (shape)
        run: python3 scripts/ci/eval_agent_quality.py --prompt-injection-only

      - name: Agent prompt regression baseline (JSON shape)
        run: python3 scripts/ci/assert_prompt_regression.py

      # Includes OpenApiContractSnapshotTests (Suite=Core): drift vs Contracts/openapi-v1.contract.snapshot.json fails the job.
      # ArchLucid.Api.Client regenerates from that snapshot on build (NSwag); Generated/ is gitignored.
      # coverage.runsettings: Cobertura format + Tier 5 excludes (generated/OpenAPI/CLI client); matches local merged reports.
      # GoldenCorpusMaterializerTests is Category=GoldenCorpusRecord (local corpus refresh only; no LLM/SQL).
      - name: Test — fast core
        run: dotnet test ArchLucid.sln --no-build -c Release --settings coverage.runsettings --filter "Suite=Core&Category!=Slow&Category!=Integration&Category!=GoldenCorpusRecord" --collect:"XPlat Code Coverage" --results-directory "${{ runner.temp }}/coverage-fast-core"

      - name: Merge coverage (HTML + GitHub job summary)
        if: success()
        run: |
          set -euo pipefail
          dotnet tool restore
          OUT="${{ runner.temp }}/coverage-report-fast-core"
          COV_DIR="${{ runner.temp }}/coverage-fast-core"
          if [ ! -d "$COV_DIR" ]; then
            echo "::error::Coverage directory missing: $COV_DIR"
            exit 1
          fi
          # Do not rely on bash ** glob (globstar is off by default on Ubuntu); enumerate Cobertura files for ReportGenerator.
          mapfile -d '' -t cov_files < <(find "$COV_DIR" -type f -name 'coverage.cobertura.xml' -print0)
          if [ "${#cov_files[@]}" -eq 0 ]; then
            echo "::error::No coverage.cobertura.xml under $COV_DIR (coverlet did not emit Cobertura)."
            find "$COV_DIR" -type f -maxdepth 6 2>/dev/null | head -n 200 || true
            exit 1
          fi
          report_list=$(IFS=';'; printf '%s' "${cov_files[*]}")
          dotnet reportgenerator \
            "-reports:${report_list}" \
            "-targetdir:${OUT}" \
            "-reporttypes:Html;TextSummary;MarkdownSummaryGithub" \
            -verbosity:Info
          if [ ! -f "${OUT}/SummaryGithub.md" ]; then
            echo "::error::ReportGenerator did not write SummaryGithub.md under ${OUT}"
            ls -la "$OUT" || true
            exit 1
          fi
          cat "${OUT}/SummaryGithub.md" >> "${GITHUB_STEP_SUMMARY}"

      - uses: actions/upload-artifact@v6
        with:
          name: coverage-fast-core
          path: ${{ runner.temp }}/coverage-fast-core/**/coverage.cobertura.xml
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-report-fast-core-html
          path: ${{ runner.temp }}/coverage-report-fast-core/**
          if-no-files-found: warn

      - name: Test — finding-engine template (not in main solution)
        run: dotnet test templates/archlucid-finding-engine/ArchLucidFindingEngine.Tests/ArchLucidFindingEngine.Tests.csproj -c Release

  # All infra/terraform* + infra/modules: init (no backend) + validate; apply-saas.ps1 consistency. No Azure creds.
  # continue-on-error: remove after every root is known clean in CI (see docs/engineering/SAAS_INFRA_VALIDATION.md).
  saas-terraform-roots-validate:
    name: "SaaS: Terraform roots validate (script suite)"
    needs: dotnet-fast-core
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PowerShell
        run: |
          set -euo pipefail
          PWSH_VER=7.4.6
          curl -sSL -o /tmp/pwsh.tgz "https://github.com/PowerShell/PowerShell/releases/download/v${PWSH_VER}/powershell-${PWSH_VER}-linux-x64.tar.gz"
          sudo mkdir -p /opt/microsoft/powershell7
          sudo tar zxf /tmp/pwsh.tgz -C /opt/microsoft/powershell7
          sudo chmod a+x /opt/microsoft/powershell7/pwsh
          sudo ln -sf /opt/microsoft/powershell7/pwsh /usr/local/bin/pwsh

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: assert_terraform_roots_valid (PowerShell + Terraform, no cloud auth)
        run: python3 scripts/ci/assert_terraform_roots_valid.py

  # Empty catalog + API process: catches DbUp vs SqlSchemaBootstrapper ordering and greenfield migration gaps (see GreenfieldSqlBootIntegrationTests).
  api-greenfield-boot:
    name: ".NET: greenfield SQL boot (empty catalog)"
    needs: dotnet-fast-core
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      - name: Create empty SQL catalog for greenfield boot
        run: |
          set -e
          docker run --rm --network host --entrypoint /opt/mssql-tools18/bin/sqlcmd \
            mcr.microsoft.com/mssql/server:2022-latest \
            -S 127.0.0.1,1433 -U sa -P 'LocalTesting123!' -C \
            -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'ArchLucidGreenfieldCi') CREATE DATABASE ArchLucidGreenfieldCi;"

      - name: Start ArchLucid.Api (background)
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5128
          ConnectionStrings__ArchLucid: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchLucidGreenfieldCi"
          ArchLucid__StorageProvider: Sql
          ArchLucidAuth__Mode: DevelopmentBypass
          Authentication__ApiKey__DevelopmentBypassAll: "true"
          AgentExecution__Mode: Simulator
          # Demo seed / schema bootstrap use SqlRowLevelSecurityBypassAmbient when RLS session context is on.
          ARCHLUCID_ALLOW_RLS_BYPASS: "true"
          ArchLucid__Persistence__AllowRlsBypass: "true"
        run: |
          set -e
          nohup dotnet run --no-build -c Release --project ArchLucid.Api/ArchLucid.Api.csproj > "${RUNNER_TEMP}/greenfield-boot.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/greenfield-boot.pid"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:5128/health/ready; then
              echo "API ready."
              exit 0
            fi
            if [ "$i" -eq 90 ]; then
              echo "::error::API did not reach /health/ready in time"
              tail -n 200 "${RUNNER_TEMP}/greenfield-boot.log" || true
              exit 1
            fi
            sleep 1
          done

      - name: Assert DbUp journal populated (SchemaVersions)
        run: |
          set -e
          RAW=$(docker run --rm --network host --entrypoint /opt/mssql-tools18/bin/sqlcmd \
            mcr.microsoft.com/mssql/server:2022-latest \
            -S 127.0.0.1,1433 -U sa -P 'LocalTesting123!' -C \
            -d ArchLucidGreenfieldCi \
            -Q "SET NOCOUNT ON; SELECT COUNT(*) FROM dbo.SchemaVersions;" \
            -h -1 -W)
          COUNT=$(printf '%s\n' "$RAW" | grep -oE '[0-9]+' | head -1)
          echo "SchemaVersions row count: $COUNT"
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 1 ]; then
            echo "::error::Expected at least one row in dbo.SchemaVersions after greenfield boot"
            printf '%s\n' "$RAW"
            exit 1
          fi

      - name: Upload greenfield boot log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: greenfield-boot-log
          path: ${{ runner.temp }}/greenfield-boot.log
          if-no-files-found: warn

  dotnet-full-regression:
    name: ".NET: full regression (SQL)"
    needs:
      - dotnet-fast-core
      - api-greenfield-boot
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore
        run: dotnet restore ArchLucid.sln

      - name: Build (Release)
        run: dotnet build ArchLucid.sln --no-restore -c Release /p:SourceRevisionId=$(git rev-parse HEAD)

      - name: Test — full solution
        env:
          ARCHLUCID_SQL_TEST: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchLucidPersistenceTests"
        run: dotnet test ArchLucid.sln --no-build -c Release --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory "${{ runner.temp }}/coverage-full"

      - name: Merge coverage (HTML + GitHub job summary)
        if: success()
        run: |
          set -euo pipefail
          dotnet tool restore
          OUT="${{ runner.temp }}/coverage-report-full"
          COV_DIR="${{ runner.temp }}/coverage-full"
          if [ ! -d "$COV_DIR" ]; then
            echo "::error::Coverage directory missing: $COV_DIR"
            exit 1
          fi
          mapfile -d '' -t cov_files < <(find "$COV_DIR" -type f -name 'coverage.cobertura.xml' -print0)
          if [ "${#cov_files[@]}" -eq 0 ]; then
            echo "::error::No coverage.cobertura.xml under $COV_DIR (coverlet did not emit Cobertura)."
            find "$COV_DIR" -type f -maxdepth 6 2>/dev/null | head -n 200 || true
            exit 1
          fi
          report_list=$(IFS=';'; printf '%s' "${cov_files[*]}")
          dotnet reportgenerator \
            "-reports:${report_list}" \
            "-targetdir:${OUT}" \
            "-reporttypes:Html;TextSummary;MarkdownSummaryGithub;Cobertura" \
            -verbosity:Info
          if [ ! -f "${OUT}/SummaryGithub.md" ]; then
            echo "::error::ReportGenerator did not write SummaryGithub.md under ${OUT}"
            ls -la "$OUT" || true
            exit 1
          fi
          cat "${OUT}/SummaryGithub.md" >> "${GITHUB_STEP_SUMMARY}"
          head -n 50 "${OUT}/Summary.txt" | grep -E 'Line coverage:|Branch coverage:' | sed 's/^[[:space:]]*//' > "${{ runner.temp }}/coverage-metrics.txt"

      # Strict profile (see docs/CODE_COVERAGE.md): merged + per-product-package line gates; no per-package skips.
      - name: Enforce merged coverage gates (line 79%, branch 63%, product packages 63% line)
        if: success()
        run: |
          set -e
          ART_DIR="${{ runner.temp }}/coverage-metrics-artifact"
          mkdir -p "${ART_DIR}"
          python3 scripts/ci/assert_merged_line_coverage_min.py \
            "${{ runner.temp }}/coverage-report-full/Cobertura.xml" 79 \
            --min-branch-pct 63 \
            --min-package-line-pct 63 \
            --warn-below-package-line-pct 70 \
            --annotations-file "${ART_DIR}/coverage-annotations-assert.txt"
          cp "${{ runner.temp }}/coverage-metrics.txt" "${ART_DIR}/coverage-metrics.txt"

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-metrics
          path: ${{ runner.temp }}/coverage-metrics-artifact/**
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-merged-cobertura
          path: ${{ runner.temp }}/coverage-report-full/Cobertura.xml
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        with:
          name: coverage-full-regression
          path: ${{ runner.temp }}/coverage-full/**/coverage.cobertura.xml
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: coverage-report-full-regression-html
          path: ${{ runner.temp }}/coverage-report-full/**
          if-no-files-found: warn

  # Polly Simmy chaos (LLM + SQL-fault + blob compositions). No SQL service container: Persistence
  # Simmy tests use synthetic SqlException and in-memory delegates only.
  #
  # Simmy chaos tests are CI-blocking; failures indicate resilience regressions.
  chaos-tests:
    name: "Resilience: Simmy chaos tests"
    needs: dotnet-full-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore
        run: dotnet restore ArchLucid.sln

      - name: Run AgentRuntime chaos tests
        run: >
          dotnet test ArchLucid.AgentRuntime.Tests/ArchLucid.AgentRuntime.Tests.csproj
          --no-restore -c Release
          --filter "FullyQualifiedName~Simmy|FullyQualifiedName~Chaos"
          --logger "trx;LogFileName=chaos-agent.trx"

      - name: Run Persistence chaos tests
        run: >
          dotnet test ArchLucid.Persistence.Tests/ArchLucid.Persistence.Tests.csproj
          --no-restore -c Release
          --filter "FullyQualifiedName~Simmy|FullyQualifiedName~Chaos"
          --logger "trx;LogFileName=chaos-persistence.trx"

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: chaos-test-results
          path: "**/*.trx"
          if-no-files-found: warn

  publish-api-client-nuget:
    name: "NuGet: pack & push API client (main/master)"
    needs: dotnet-full-regression
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore
        run: dotnet restore ArchLucid.Api.Client/ArchLucid.Api.Client.csproj

      - name: Pack ArchLucid.Api.Client
        run: |
          dotnet pack ArchLucid.Api.Client/ArchLucid.Api.Client.csproj \
            --no-restore \
            -c Release \
            -o "${RUNNER_TEMP}/nuget" \
            /p:SourceRevisionId=$(git rev-parse HEAD) \
            /p:ArchLucidApiClientPackageVersion=1.0.${{ github.run_number }}

      - uses: actions/upload-artifact@v6
        with:
          name: archlucid-api-client-nupkg-ci
          path: ${{ runner.temp }}/nuget/*.nupkg

      - name: Push (NuGet.org)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "NUGET_API_KEY is not set; skipping NuGet push (artifact upload still contains the .nupkg)."
            exit 0
          fi
          dotnet nuget push "${RUNNER_TEMP}/nuget/"*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  coverage-pr-comment:
    # Runs on every green full regression so the check can be required on the default branch;
    # comment steps are gated to same-repo pull_request only.
    name: "PR: coverage comment"
    needs: dotnet-full-regression
    if: needs.dotnet-full-regression.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Decide whether to post PR comment
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "post=false" >> "$GITHUB_OUTPUT"
            echo "Not a pull request; skipping sticky comment."
          elif [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "post=false" >> "$GITHUB_OUTPUT"
            echo "Fork PR; skipping sticky comment (token scope)."
          else
            echo "post=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.gate.outputs.post == 'true'

      - uses: actions/download-artifact@v6
        if: steps.gate.outputs.post == 'true'
        with:
          name: coverage-metrics
          path: head-metrics

      - uses: actions/download-artifact@v6
        continue-on-error: true
        if: steps.gate.outputs.post == 'true'
        with:
          name: coverage-merged-cobertura
          path: head-cobertura

      - name: Download base branch coverage metrics (optional)
        continue-on-error: true
        if: steps.gate.outputs.post == 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ github.token }}
          workflow: ci.yml
          workflow_conclusion: success
          branch: ${{ github.event.pull_request.base.ref }}
          name: coverage-metrics
          path: base-metrics
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Build comment body
        id: cov
        if: steps.gate.outputs.post == 'true'
        env:
          HEAD_FILE: head-metrics/coverage-metrics.txt
          BASE_FILE: base-metrics/coverage-metrics.txt
          COBERTURA_FILE: head-cobertura/Cobertura.xml
          ANNOTATIONS_FILE: head-metrics/coverage-annotations.txt
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/ci/build_coverage_pr_comment.py
          if [ -f head-metrics/coverage-annotations-assert.txt ]; then
            cat head-metrics/coverage-annotations-assert.txt >> head-metrics/coverage-annotations.txt
          fi
          if [ -f head-metrics/coverage-annotations.txt ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              echo "::warning::$line"
            done < head-metrics/coverage-annotations.txt
          fi

      - uses: marocchino/sticky-pull-request-comment@v3
        if: steps.gate.outputs.post == 'true'
        with:
          header: archlucid-coverage
          recreate: true
          number: ${{ github.event.pull_request.number }}
          message: ${{ steps.cov.outputs.body }}

  docker-build-smoke:
    name: "Containers: Docker build smoke"
    needs: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # cache-from always (fork PRs may read base-branch cache). cache-to only on push to main/master
      # — fork PR workflows get a read-only token and fail if we always pass cache-to.
      actions: write
    steps:
      - uses: actions/checkout@v5

      - name: Assert unique Next.js App Router paths (route-group collision guard)
        run: python3 scripts/ci/assert_archlucid_ui_app_router_unique_paths.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Decide whether to write BuildKit GHA cache
        id: gha_cache_write
        run: |
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; }; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build API image (read/write GHA cache)
        if: steps.gha_cache_write.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: archlucid-api:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke
          cache-to: type=gha,scope=api-docker-smoke,mode=max

      - name: Build API image (read-only GHA cache)
        if: steps.gha_cache_write.outputs.enabled != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: archlucid-api:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke

      - name: Build Operator UI image (read/write GHA cache)
        if: steps.gha_cache_write.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: archlucid-ui/Dockerfile
          tags: archlucid-ui:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=ui-docker-smoke
          cache-to: type=gha,scope=ui-docker-smoke,mode=max

      - name: Build Operator UI image (read-only GHA cache)
        if: steps.gha_cache_write.outputs.enabled != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: archlucid-ui/Dockerfile
          tags: archlucid-ui:ci
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=ui-docker-smoke

      - name: Trivy scan API image (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # embeds setup-trivy@v0.2.6; tag v0.35.0 does not
        with:
          version: v0.69.3
          scan-type: image
          image-ref: archlucid-api:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          cache: false

      - name: Trivy scan Operator UI image (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # embeds setup-trivy@v0.2.6; tag v0.35.0 does not
        with:
          version: v0.69.3
          scan-type: image
          image-ref: archlucid-ui:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          cache: false

  ui-unit:
    name: "Operator UI: unit (Vitest)"
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Assert unique Next.js App Router paths (route-group collision guard)
        run: python3 scripts/ci/assert_archlucid_ui_app_router_unique_paths.py

      - name: Setup Node.js
