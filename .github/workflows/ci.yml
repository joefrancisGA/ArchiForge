          path: archlucid-ui/playwright-report
          if-no-files-found: warn

  # k6 operator-path API smoke (health/ready + version + create run + authority list). Runs after full regression;
  # merge-blocking. Native k6; 5 VUs × ~60s (ramp 10s / hold 40s / ramp 10s). Rate limits raised for synthetic traffic.
  k6-smoke-api:
    name: "Performance: k6 API smoke (operator path)"
    needs: dotnet-full-regression
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      - name: Install k6
        shell: bash
        run: bash scripts/ci/install_k6_apt.sh

      - name: Create catalog + start API (shared script)
        run: bash scripts/ci/start_api_for_k6.sh ArchLucidK6Smoke "${RUNNER_TEMP}/k6-api.log" "${RUNNER_TEMP}/k6-api.pid"

      - name: Run k6 API smoke (operator path)
        env:
          ARCHLUCID_BASE_URL: http://127.0.0.1:5128
          K6_SCENARIO: smoke
          K6_SUMMARY_PATH: ${{ runner.temp }}/k6-api-smoke-summary.json
        run: |
          set -e
          k6 run "${GITHUB_WORKSPACE}/tests/load/k6-api-smoke.js"

      - name: Assert k6 API smoke thresholds (p95 + failed rate)
        run: >
          python3 scripts/ci/assert_k6_ci_smoke_summary.py
          "${{ runner.temp }}/k6-api-smoke-summary.json"
          --max-failed-rate 0.01
          --max-p95-ms 2000

      - name: k6 API smoke summary (job log)
        run: python3 scripts/ci/print_k6_summary_metrics.py "${{ runner.temp }}/k6-api-smoke-summary.json"

      - name: Upload k6 API smoke summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-smoke-results
          path: ${{ runner.temp }}/k6-api-smoke-summary.json
          if-no-files-found: warn

      - name: Upload k6 API log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-smoke-api-log
          path: ${{ runner.temp }}/k6-api.log
          if-no-files-found: warn

      - name: Stop ArchLucid.Api (background)
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/k6-api.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/k6-api.pid")" 2>/dev/null || true
          fi

  # k6 CI smoke: read + write API paths. Merge-blocking; thresholds in scripts/ci/assert_k6_ci_smoke_summary.py + docs/LOAD_TEST_BASELINE.md.
  k6-ci-smoke:
