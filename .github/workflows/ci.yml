    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archlucid-ui/package-lock.json

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      - name: Install UI deps & build Next (standalone)
        working-directory: archlucid-ui
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm ci
          npm run build

      - name: Generate RSA keys & PyJWT (CI JWT mint)
        run: |
          set -e
          pip install --quiet PyJWT cryptography
          openssl genrsa -out "${RUNNER_TEMP}/ci-jwt-priv.pem" 2048
          openssl rsa -in "${RUNNER_TEMP}/ci-jwt-priv.pem" -pubout -out "${RUNNER_TEMP}/ci-jwt-pub.pem"

      - name: Create SQL catalog for live API e2e (JwtBearer)
        run: |
          set -e
          docker run --rm --network host --entrypoint /opt/mssql-tools18/bin/sqlcmd \
            mcr.microsoft.com/mssql/server:2022-latest \
            -S 127.0.0.1,1433 -U sa -P 'LocalTesting123!' -C \
            -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'ArchLucidLiveE2eJwt') CREATE DATABASE ArchLucidLiveE2eJwt;"

      - name: Start ArchLucid.Api (background, JwtBearer + local PEM)
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5128
          ConnectionStrings__ArchLucid: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchLucidLiveE2eJwt"
          ArchLucid__StorageProvider: Sql
          ArchLucidAuth__Mode: JwtBearer
          ArchLucidAuth__Authority: ""
          ArchLucidAuth__Audience: ""
          ArchLucidAuth__JwtSigningPublicKeyPemPath: ${{ runner.temp }}/ci-jwt-pub.pem
          ArchLucidAuth__JwtLocalIssuer: "https://ci.archlucid.local"
          ArchLucidAuth__JwtLocalAudience: "api://archlucid-live-e2e-jwt"
          Authentication__ApiKey__DevelopmentBypassAll: "false"
          AgentExecution__Mode: Simulator
          Cors__AllowedOrigins__0: "http://127.0.0.1:3000"
          Cors__AllowedOrigins__1: "http://localhost:3000"
        run: |
          set -e
          nohup dotnet run --no-build -c Release --project ArchLucid.Api/ArchLucid.Api.csproj > "${RUNNER_TEMP}/live-api-jwt.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/live-api-jwt.pid"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:5128/health/ready; then
              echo "API ready (JwtBearer + local PEM)."
              exit 0
            fi
            if [ "$i" -eq 90 ]; then
              echo "::error::API (JwtBearer) did not reach /health/ready in time"
              tail -n 200 "${RUNNER_TEMP}/live-api-jwt.log" || true
              exit 1
            fi
            sleep 2
          done

      - name: Install Playwright browsers & run live e2e (JWT subset)
        working-directory: archlucid-ui
        env:
          CI: true
          LIVE_API_URL: http://127.0.0.1:5128
          LIVE_E2E_SKIP_NEXT_BUILD: "1"
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          set -e
          python3 "${GITHUB_WORKSPACE}/scripts/ci/mint_ci_jwt.py" \
            --private-key "${RUNNER_TEMP}/ci-jwt-priv.pem" \
            --issuer "https://ci.archlucid.local" \
            --audience "api://archlucid-live-e2e-jwt" \
            --out-token "${RUNNER_TEMP}/ci-jwt-token.txt"
          TOKEN="$(tr -d '\n\r' < "${RUNNER_TEMP}/ci-jwt-token.txt")"
          echo "::add-mask::${TOKEN}"
          export LIVE_JWT_TOKEN="${TOKEN}"
          export ARCHLUCID_PROXY_BEARER_TOKEN="${TOKEN}"
          npx playwright install --with-deps chromium
          curl -fsS http://127.0.0.1:5128/health/ready
          npx playwright test -c playwright.live.config.ts \
            live-api-jwt-auth.spec.ts \
            live-api-journey.spec.ts \
            live-api-negative-paths.spec.ts

      - name: Upload live API log (JwtBearer)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-e2e-live-jwt-api-log
          path: ${{ runner.temp }}/live-api-jwt.log
          if-no-files-found: warn

      - name: Upload Playwright report (JwtBearer)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-e2e-live-jwt-playwright-report
          path: archlucid-ui/playwright-report
          if-no-files-found: warn

  # k6 operator-path API smoke (health/ready + version + create run + authority list). Runs after full regression;
  # merge-blocking. Native k6; 5 VUs × ~60s (ramp 10s / hold 40s / ramp 10s). Rate limits raised for synthetic traffic.
  k6-smoke-api:
    name: "Performance: k6 API smoke (operator path)"
    needs: dotnet-full-regression
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      - name: Install k6
        shell: bash
        run: bash scripts/ci/install_k6_apt.sh

      - name: Create catalog + start API (shared script)
        run: bash scripts/ci/start_api_for_k6.sh ArchLucidK6Smoke "${RUNNER_TEMP}/k6-api.log" "${RUNNER_TEMP}/k6-api.pid"

      - name: Run k6 API smoke (operator path)
        env:
          ARCHLUCID_BASE_URL: http://127.0.0.1:5128
          K6_SCENARIO: smoke
          K6_SUMMARY_PATH: ${{ runner.temp }}/k6-api-smoke-summary.json
        run: |
          set -e
          k6 run "${GITHUB_WORKSPACE}/tests/load/k6-api-smoke.js"

      - name: Assert k6 API smoke thresholds (p95 + failed rate)
        run: >
          python3 scripts/ci/assert_k6_ci_smoke_summary.py
          "${{ runner.temp }}/k6-api-smoke-summary.json"
          --max-failed-rate 0.01
          --max-p95-ms 2000

      - name: k6 API smoke summary (job log)
        run: python3 scripts/ci/print_k6_summary_metrics.py "${{ runner.temp }}/k6-api-smoke-summary.json"

      - name: Upload k6 API smoke summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-smoke-results
          path: ${{ runner.temp }}/k6-api-smoke-summary.json
          if-no-files-found: warn

      - name: Upload k6 API log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-smoke-api-log
          path: ${{ runner.temp }}/k6-api.log
          if-no-files-found: warn

      - name: Stop ArchLucid.Api (background)
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/k6-api.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/k6-api.pid")" 2>/dev/null || true
          fi

  # k6 CI smoke: read + write API paths. Merge-blocking; thresholds in scripts/ci/assert_k6_ci_smoke_summary.py + docs/LOAD_TEST_BASELINE.md.
  k6-ci-smoke:
    name: "Performance: k6 CI smoke (read + write baseline)"
    needs: dotnet-fast-core
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      - name: Install k6
        shell: bash
        run: bash scripts/ci/install_k6_apt.sh

      - name: Create catalog + start API (shared script)
        run: bash scripts/ci/start_api_for_k6.sh ArchLucidK6CiSmoke "${RUNNER_TEMP}/k6-ci-api.log" "${RUNNER_TEMP}/k6-ci-api.pid"

      - name: Run k6 CI smoke
        env:
          BASE_URL: http://127.0.0.1:5128
        run: |
          set -e
          k6 run "${GITHUB_WORKSPACE}/tests/load/ci-smoke.js" --summary-export "${RUNNER_TEMP}/k6-ci-summary.json"

      - name: Assert k6 CI smoke thresholds (per-tag p95 + failed rate)
        run: python3 scripts/ci/assert_k6_ci_smoke_summary.py "${RUNNER_TEMP}/k6-ci-summary.json" --max-failed-rate 0.02 --max-p95-ms 3000 --per-tag-ci-smoke

      - name: k6 CI smoke summary (job log)
        run: python3 scripts/ci/print_k6_summary_metrics.py "${RUNNER_TEMP}/k6-ci-summary.json"

      - name: Upload k6 CI smoke summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-ci-smoke-summary
          path: ${{ runner.temp }}/k6-ci-summary.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload k6 CI API log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-ci-smoke-api-log
          path: ${{ runner.temp }}/k6-ci-api.log
          if-no-files-found: warn

  dotnet-benchmark-regression:
    name: ".NET: benchmark regression (short job)"
    needs: dotnet-fast-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Restore & build benchmarks
        run: |
          dotnet restore ArchLucid.Benchmarks/ArchLucid.Benchmarks.csproj
          dotnet build --no-restore -c Release ArchLucid.Benchmarks/ArchLucid.Benchmarks.csproj

      - name: Run BenchmarkDotNet (short) and compare baseline
        env:
          BENCH_ART: ${{ runner.temp }}/bench-artifacts
        run: |
          set -e
          dotnet run -c Release --no-build --project ArchLucid.Benchmarks -- \
            --filter "*" -j short --exporters json --artifacts "$BENCH_ART"
          python3 scripts/ci/compare_benchmark_baseline.py \
            --baseline ci/benchmark-baseline.json \
            --results "$BENCH_ART/results"

  security-zap-api-baseline:
    name: "Security: OWASP ZAP baseline (API container)"
    needs: docker-build-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image (reuse GHA cache from docker-build-smoke)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: archlucid-api:zap
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke

      - name: Run API on Docker network and ZAP baseline
        env:
          ZNET: zapci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -e
          cleanup() {
            docker rm -f archlucid-zap-api 2>/dev/null || true
            docker network rm "$ZNET" 2>/dev/null || true
          }
          trap cleanup EXIT
          docker network create "$ZNET"
          # zap-baseline.py writes /zap/wrk/zap.yaml; the image user often cannot write the image's /zap/wrk.
          ZAP_WRK="${RUNNER_TEMP:-/tmp}/zap-wrk-${ZNET}"
          mkdir -p "$ZAP_WRK"
          # ZAP runs as uid 1000 (zap); RUNNER_TEMP is often owned by uid 1001 (runner) → Permission denied without this.
          chmod -R a+rwx "$ZAP_WRK"
          docker run -d --name archlucid-zap-api --network "$ZNET" -p 8080:8080 \
            -e ASPNETCORE_URLS=http://+:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            archlucid-api:zap
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health/live; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API did not become healthy in time"
              exit 1
            fi
            sleep 2
          done
          docker run --rm --network "$ZNET" \
            -v "$ZAP_WRK:/zap/wrk" \
            -v "$GITHUB_WORKSPACE/infra/zap:/zap/wrk/config:ro" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://archlucid-zap-api:8080 -c config/baseline-pr.tsv

  # Lightweight per-PR API fuzz: Schemathesis examples-only phase (~1–2 min) to catch response
  # schema violations before merge. Full fuzz (fuzzing + stateful) runs weekly in schemathesis-scheduled.yml.
  api-schemathesis-light:
    name: "Security: Schemathesis light fuzz (PR)"
    needs: dotnet-full-regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Build API image
        run: docker build -f ArchLucid.Api/Dockerfile -t archlucid-api:fuzz-light .

      - name: Run API and lightweight Schemathesis
        env:
          FUZZNET: fuzz-light-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          cleanup() {
            docker rm -f archlucid-fuzz-api 2>/dev/null || true
            docker network rm "$FUZZNET" 2>/dev/null || true
          }
          trap cleanup EXIT
          docker network create "$FUZZNET"
          docker run -d --name archlucid-fuzz-api --network "$FUZZNET" -p 8080:8080 \
            -e ASPNETCORE_URLS=http://+:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            archlucid-api:fuzz-light
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health/live; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API did not become healthy in time"
              docker logs archlucid-fuzz-api 2>&1 | tail -n 200 || true
              exit 1
            fi
            sleep 2
          done
          docker run --rm --network "$FUZZNET" \
            schemathesis/schemathesis:stable \
            run http://archlucid-fuzz-api:8080/openapi/v1.json \
            --url http://archlucid-fuzz-api:8080 \
            --checks=all \
            --phases=examples \
            --request-timeout 5 \
            --max-response-time 10
