  # Live API + Sql + Next.js (no mock). Gating — failures block merge.
  ui-e2e-live:
    name: "Operator UI: e2e live API + SQL"
    needs: dotnet-full-regression
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            **/*.csproj

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archlucid-ui/package-lock.json

      - name: Restore & build API (Release)
        run: |
          dotnet restore ArchLucid.sln
          dotnet build ArchLucid.Api/ArchLucid.Api.csproj --no-restore -c Release

      # Build Next before starting the API so Playwright webServer does not run `npm run build`
      # while dotnet + SQL are already up (reduces OOM risk and API process being killed).
      - name: Install UI deps & build Next (standalone)
        working-directory: archlucid-ui
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm ci
          npm run build

      # API connects with Initial Catalog set; schema bootstrap does not CREATE DATABASE (unlike dotnet test + SqlServerTestCatalogCommands).
      - name: Create SQL catalog for live API e2e
        run: |
          set -e
          docker run --rm --network host --entrypoint /opt/mssql-tools18/bin/sqlcmd \
            mcr.microsoft.com/mssql/server:2022-latest \
            -S 127.0.0.1,1433 -U sa -P 'LocalTesting123!' -C \
            -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'ArchLucidLiveE2e') CREATE DATABASE ArchLucidLiveE2e;"

      - name: Start ArchLucid.Api (background)
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5128
          ConnectionStrings__ArchLucid: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchLucidLiveE2e"
          ArchLucid__StorageProvider: Sql
          ArchLucidAuth__Mode: DevelopmentBypass
          Authentication__ApiKey__DevelopmentBypassAll: "true"
          AgentExecution__Mode: Simulator
          ARCHLUCID_ALLOW_RLS_BYPASS: "true"
          ArchLucid__Persistence__AllowRlsBypass: "true"
          Observability__Prometheus__Enabled: "true"
          Observability__Prometheus__RequireScrapeAuthentication: "false"
          RateLimiting__Registration__PermitLimit: "500"
          ArchLucid__E2eHarness__SharedSecret: "ci-live-e2e-harness-secret-min16!"
          Cors__AllowedOrigins__0: "http://127.0.0.1:3000"
          Cors__AllowedOrigins__1: "http://localhost:3000"
        run: |
          set -e
          nohup dotnet run --no-build -c Release --project ArchLucid.Api/ArchLucid.Api.csproj > "${RUNNER_TEMP}/live-api.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/live-api.pid"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:5128/health/ready; then
              echo "API ready."
              exit 0
            fi
            if [ "$i" -eq 90 ]; then
              echo "::error::API did not reach /health/ready in time"
              tail -n 200 "${RUNNER_TEMP}/live-api.log" || true
              exit 1
            fi
            sleep 2
          done

      - name: Install Playwright browsers & run live e2e
        working-directory: archlucid-ui
        env:
          CI: true
          LIVE_API_URL: http://127.0.0.1:5128
          LIVE_E2E_SKIP_NEXT_BUILD: "1"
          LIVE_E2E_HARNESS_SECRET: "ci-live-e2e-harness-secret-min16!"
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npx playwright install --with-deps chromium
          curl -fsS http://127.0.0.1:5128/health/ready
          npx playwright test

      - name: Upload live API log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-e2e-live-api-log
          path: ${{ runner.temp }}/live-api.log
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-e2e-live-playwright-report
          path: archlucid-ui/playwright-report
          if-no-files-found: warn

