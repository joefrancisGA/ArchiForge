# Tiered CI (see docs/TEST_EXECUTION_MODEL.md):
#   Tier 1 — .NET fast core (fail-fast, no SQL)
#   Tier 2 — .NET full regression + SQL (runs after Tier 1 passes)
#   Tier 3a — Operator UI unit (Vitest / jsdom)
#   Tier 3b — Operator UI e2e (Playwright; browser-heavy)
#
# Re-run failed jobs from the Actions tab. Local equivalents: test-fast-core.*, test-full.*,
# archiforge-ui: npm test / npm run test:e2e.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dotnet-fast-core:
    name: ".NET: fast core (corset)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Vulnerable package audit
        run: dotnet list package --vulnerable --include-transitive --output-format json

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Context ingestion DI guards
        run: python scripts/assert_context_ingestion_di_guards.py

      - name: Test — fast core
        run: dotnet test ArchiForge.sln --no-build -c Release --filter "Suite=Core&Category!=Slow&Category!=Integration"

  dotnet-full-regression:
    name: ".NET: full regression (SQL)"
    needs: dotnet-fast-core
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "LocalTesting123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Test — full solution
        env:
          ARCHIFORGE_SQL_TEST: "Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchiForgePersistenceTests"
        run: dotnet test ArchiForge.sln --no-build -c Release

  ui-unit:
    name: "Operator UI: unit (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archiforge-ui/package-lock.json

      - name: Install & run unit tests
        working-directory: archiforge-ui
        run: |
          npm ci
          npm run test

  ui-e2e-smoke:
    name: "Operator UI: e2e smoke (Playwright)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: archiforge-ui/package-lock.json

      - name: Install dependencies & run Playwright smoke
        working-directory: archiforge-ui
        env:
          CI: true
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test
