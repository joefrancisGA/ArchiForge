            --issuer "https://ci.archlucid.local" \
            --audience "api://archlucid-live-e2e-jwt" \
            --out-token "${RUNNER_TEMP}/ci-jwt-token.txt"
          TOKEN="$(tr -d '\n\r' < "${RUNNER_TEMP}/ci-jwt-token.txt")"
          echo "::add-mask::${TOKEN}"
          export LIVE_JWT_TOKEN="${TOKEN}"
          export ARCHLUCID_PROXY_BEARER_TOKEN="${TOKEN}"
          npx playwright install --with-deps chromium
          curl -fsS http://127.0.0.1:5128/health/ready
