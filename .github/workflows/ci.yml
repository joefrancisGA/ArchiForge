          k6 run "${GITHUB_WORKSPACE}/tests/load/ci-smoke.js" --summary-export "${RUNNER_TEMP}/k6-ci-summary.json"

      - name: Assert k6 CI smoke thresholds (per-tag p95 + failed rate)
        run: python3 scripts/ci/assert_k6_ci_smoke_summary.py "${RUNNER_TEMP}/k6-ci-summary.json" --max-failed-rate 0.02 --max-p95-ms 3000 --per-tag-ci-smoke

      - name: k6 CI smoke summary (job log)
