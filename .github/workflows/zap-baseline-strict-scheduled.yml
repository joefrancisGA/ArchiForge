# Weekly ZAP baseline (same strict mode as PR CI): WARN and FAIL both fail the step — second line of defense for config drift.
# See docs/security/ZAP_BASELINE_RULES.md and infra/zap/README.md.
name: "Security: ZAP baseline (scheduled, strict visibility)"

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build API image
        run: docker build -f ArchLucid.Api/Dockerfile -t archlucid-api:zap-strict .

      - name: Run API and ZAP (strict baseline)
        env:
          ZNET: zapstrict-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -e
          cleanup() {
            docker rm -f archlucid-zap-api-strict 2>/dev/null || true
            docker network rm "$ZNET" 2>/dev/null || true
          }
          trap cleanup EXIT
          docker network create "$ZNET"
          ZAP_WRK="${RUNNER_TEMP:-/tmp}/zap-wrk-${ZNET}"
          mkdir -p "$ZAP_WRK"
          # ZAP runs as uid 1000 (zap); RUNNER_TEMP is often owned by uid 1001 (runner) → Permission denied without this.
          chmod -R a+rwx "$ZAP_WRK"
          docker run -d --name archlucid-zap-api-strict --network "$ZNET" -p 8080:8080 \
            -e ASPNETCORE_URLS=http://+:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            archlucid-api:zap-strict
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health/live; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API did not become healthy in time"
              exit 1
            fi
            sleep 2
          done
          docker run --rm --network "$ZNET" \
            -v "$ZAP_WRK:/zap/wrk" \
            -v "$GITHUB_WORKSPACE/infra/zap:/zap/wrk/config:ro" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://archlucid-zap-api-strict:8080 -c config/baseline-pr.tsv
