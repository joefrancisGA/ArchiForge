# Nightly append of coordinator/authority audit count row into docs/runbooks/COORDINATOR_TO_AUTHORITY_PARITY.md (ADR 0021 gate iv helper).
#
# Owner-approved write path (2026-04-21 Q&A — docs/PENDING_QUESTIONS.md item 16, sub-bullet
# "parity-probe write path"): direct auto-commit to `main` is acceptable for this workflow because
# (a) the upserted row is a single deterministic Markdown-table line with no schema/code change;
# (b) `[skip ci]` in the commit message prevents recursive CI cost; (c) the concurrency group
# below serializes nightly runs so two probes never race; (d) the only file path mutated is
# `docs/runbooks/COORDINATOR_TO_AUTHORITY_PARITY.md` — no broader write surface is granted.
# `permissions: contents: write` is intentionally scoped only to this workflow file.
#
# Use `workflow_dispatch` for ad-hoc dry runs (the diff guard below makes the push idempotent).
name: "Runbooks: coordinator parity probe (daily)"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coordinator-parity-daily
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run probe (dry append — removes need for SQL on first nights)
        env:
          ARCHLUCID_COORDINATOR_PARITY_ODBC: ${{ secrets.ARCHLUCID_COORDINATOR_PARITY_ODBC }}
        run: |
          set -euo pipefail
          python3 scripts/ci/coordinator_parity_probe.py --runbook docs/runbooks/COORDINATOR_TO_AUTHORITY_PARITY.md

      - name: Commit runbook if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/runbooks/COORDINATOR_TO_AUTHORITY_PARITY.md; then
            echo "No runbook changes."
            exit 0
          fi
          git add docs/runbooks/COORDINATOR_TO_AUTHORITY_PARITY.md
          git commit -m "chore(runbooks): coordinator parity probe row [skip ci]"
          git push
