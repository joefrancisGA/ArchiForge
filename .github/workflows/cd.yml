# Continuous deployment: multi-job pipeline (build → Terraform plan/apply → Container Apps → smoke → optional rollback → NuGet → notify).
# Azure auth: OIDC only (`azure/login@v2`, `id-token: write`). Do not use AZURE_CREDENTIALS or stored SP passwords.
#
# Per GitHub Environment (`staging` / `production`), configure required reviewers + secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   ACR_LOGIN_SERVER (optional; skips image push when unset)
#   ACR_NAME — optional explicit registry name for `az acr login --name`
#   TF_WORKING_DIRECTORY — optional, e.g. infra/terraform-container-apps (copy .example tfvars to terraform.tfvars / production.tfvars)
#   NUGET_API_KEY — optional; pushes ArchLucid.Api.Client when set (production path)
#   AZURE_RESOURCE_GROUP, CONTAINER_APP_API_NAME — optional; `az containerapp update` after image push
#   CONTAINER_APP_WORKER_NAME — optional; worker uses the same image as the API (ArchLucid.Api Dockerfile publishes Worker.dll; CA command is already set in Terraform)
#   CONTAINER_APP_UI_NAME — optional second Container App for the UI image
#   SMOKE_TEST_BASE_URL — optional; post-deploy validation (see scripts/ci/cd-post-deploy-verify.sh)
#   SMOKE_SYNTHETIC_PATH — optional extra path after /version (default /version); must return HTTP 200 if not /version
#   CD_POST_DEPLOY_MAX_ATTEMPTS / CD_POST_DEPLOY_RETRY_WAIT_SECONDS — optional repo vars for retry loop (cold start)
#   CD_NOTIFY_WEBHOOK_URL — optional Slack-compatible JSON webhook
#
# Rollback: set repository variable CD_ROLLBACK_ON_SMOKE_FAILURE=true to deactivate the new API revision when smoke fails.
# Manual rollback: workflow_dispatch with action=rollback (same target environment).
#
# Traceability: images and Terraform runs are tagged with git SHA (`IMAGE_TAG`, default github.sha).
name: CD

on:
  workflow_dispatch:
    inputs:
      action:
        description: "deploy runs the full pipeline; rollback runs only manual rollback for the target environment"
        required: true
        type: choice
        default: deploy
        options:
          - deploy
          - rollback
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production
      run_terraform_apply:
        description: "Run terraform apply after plan (requires TF_WORKING_DIRECTORY and configured backend)"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: archlucid-cd-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  build-push-images:
    name: Build and push images (${{ github.event.inputs.target }})
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    outputs:
      image_tag: ${{ steps.image_tag_out.outputs.image_tag }}
    env:
      TF_DIR: ${{ secrets.TF_WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag and latest alias
        run: |
          TAG="${{ vars.IMAGE_TAG }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
          if [ "${{ github.event.inputs.target }}" = "staging" ]; then
            echo "LATEST_ALIAS=latest-staging" >> "$GITHUB_ENV"
          else
            echo "LATEST_ALIAS=latest-production" >> "$GITHUB_ENV"
          fi

      - name: Export image_tag output
        id: image_tag_out
        run: echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Detect ACR configuration
        id: acr
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          if [ -n "${ACR_LOGIN_SERVER:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ACR_LOGIN_SERVER not set — skipping image build/push."
          fi

      - name: Set up Docker Buildx
        if: steps.acr.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        if: steps.acr.outputs.configured == 'true'
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          REG_NAME="${ACR_NAME:-${ACR_LOGIN_SERVER%%.*}}"
          az acr login --name "$REG_NAME"

      - name: Build and push API image (BuildKit + GHA cache)
        if: steps.acr.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ArchLucid.Api/Dockerfile
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/archlucid-api:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/archlucid-api:${{ env.LATEST_ALIAS }}
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-docker-smoke
          cache-to: type=gha,scope=api-docker-smoke,mode=max

      - name: Build and push UI image (BuildKit + GHA cache)
        if: steps.acr.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./archlucid-ui
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/archlucid-ui:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/archlucid-ui:${{ env.LATEST_ALIAS }}
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=ui-docker-smoke
          cache-to: type=gha,scope=ui-docker-smoke,mode=max

  terraform-plan:
    name: Terraform plan (${{ github.event.inputs.target }})
    needs: build-push-images
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    outputs:
      plan_created: ${{ steps.plan_gate.outputs.plan_created }}
    env:
      TF_DIR: ${{ secrets.TF_WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform plan gate
        id: plan_gate
        run: |
          if [ -z "${TF_DIR:-}" ]; then
            echo "TF_WORKING_DIRECTORY not set — skipping Terraform plan."
            echo "plan_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "plan_created=true" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        if: steps.plan_gate.outputs.plan_created == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init and plan
        if: steps.plan_gate.outputs.plan_created == 'true'
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          cd "$TF_DIR"
          terraform init -input=false
          VAR_FILE_ARGS=""
          if [ "$TARGET" = "production" ] && [ -f production.tfvars ]; then
            VAR_FILE_ARGS="-var-file=production.tfvars"
          elif [ "$TARGET" = "staging" ] && [ -f terraform.tfvars ]; then
            VAR_FILE_ARGS="-var-file=terraform.tfvars"
          fi
          # terraform.tfvars is auto-loaded when present; explicit -var-file documents operator intent per target.
          terraform plan -input=false -out=tfplan $VAR_FILE_ARGS

      - name: Stage Terraform plan for artifact upload
        if: steps.plan_gate.outputs.plan_created == 'true'
        run: mkdir -p "$GITHUB_WORKSPACE/.cd-tfplan" && cp "$TF_DIR/tfplan" "$GITHUB_WORKSPACE/.cd-tfplan/tfplan"

      - name: Upload Terraform plan artifact
        if: steps.plan_gate.outputs.plan_created == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: tfplan-${{ github.event.inputs.target }}
          path: .cd-tfplan/tfplan
          if-no-files-found: error

      - name: Terraform plan summary
        if: steps.plan_gate.outputs.plan_created == 'true'
        run: |
          cd "$TF_DIR"
          echo "## Terraform plan (${{ github.event.inputs.target }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          terraform show -no-color tfplan >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  terraform-apply:
    name: Terraform apply (${{ github.event.inputs.target }})
    needs: terraform-plan
    if: |
      github.event.inputs.action == 'deploy' &&
      (github.event.inputs.run_terraform_apply == true || github.event.inputs.run_terraform_apply == 'true') &&
      needs.terraform-plan.outputs.plan_created == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    env:
      TF_DIR: ${{ secrets.TF_WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Download Terraform plan
        uses: actions/download-artifact@v6
        with:
          name: tfplan-${{ github.event.inputs.target }}
          path: ${{ runner.temp }}/tfplan-artifact

      - name: Terraform init and apply
        run: |
          cd "$TF_DIR"
          terraform init -input=false
          PLAN_FILE=$(find "${{ runner.temp }}/tfplan-artifact" -name tfplan -type f | head -1)
          if [ -z "$PLAN_FILE" ] || [ ! -f "$PLAN_FILE" ]; then
            echo "Could not locate downloaded tfplan under ${{ runner.temp }}/tfplan-artifact"
            exit 1
          fi
          cp "$PLAN_FILE" ./tfplan
          terraform apply -input=false tfplan

  deploy-container-apps:
    name: Deploy Container Apps (${{ github.event.inputs.target }})
    needs: [build-push-images, terraform-plan, terraform-apply]
    if: |
      always() &&
      github.event.inputs.action == 'deploy' &&
      needs.build-push-images.result == 'success' &&
      needs.terraform-plan.result == 'success' &&
      (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    outputs:
      revision_before: ${{ steps.api_rev_before.outputs.revision }}
      revision_after: ${{ steps.api_rev_after.outputs.revision }}
      api_rev_before_skip: ${{ steps.api_rev_before.outputs.skip }}
      worker_revision_before: ${{ steps.worker_rev_before.outputs.revision }}
      worker_revision_after: ${{ steps.worker_rev_after.outputs.revision }}
      worker_rev_before_skip: ${{ steps.worker_rev_before.outputs.skip }}
    env:
      IMAGE_TAG: ${{ needs.build-push-images.outputs.image_tag }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Record API revision before Container Apps update
        id: api_rev_before
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REV=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Record worker revision before Container Apps update
        id: worker_rev_before
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_WORKER_NAME: ${{ secrets.CONTAINER_APP_WORKER_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_WORKER_NAME:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REV=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --query "properties.latestRevisionName" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update Azure Container Apps (optional)
        id: containerapp_update
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
          CONTAINER_APP_WORKER_NAME: ${{ secrets.CONTAINER_APP_WORKER_NAME }}
          CONTAINER_APP_UI_NAME: ${{ secrets.CONTAINER_APP_UI_NAME }}
        run: |
          if [ -z "${ACR_LOGIN_SERVER:-}" ] || [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            echo "Skipping Container Apps update (set ACR_LOGIN_SERVER, AZURE_RESOURCE_GROUP, CONTAINER_APP_API_NAME)."
            exit 0
          fi
          API_IMAGE="${ACR_LOGIN_SERVER}/archlucid-api:${IMAGE_TAG}"
          az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --image "$API_IMAGE"
          if [ -n "${CONTAINER_APP_WORKER_NAME:-}" ]; then
            az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --image "$API_IMAGE"
          fi
          if [ -n "${CONTAINER_APP_UI_NAME:-}" ]; then
            UI_IMAGE="${ACR_LOGIN_SERVER}/archlucid-ui:${IMAGE_TAG}"
            az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_UI_NAME" --image "$UI_IMAGE"
          fi

      - name: Record API revision after update
        id: api_rev_after
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            echo "revision=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REV=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"

      - name: Record worker revision after update
        id: worker_rev_after
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_WORKER_NAME: ${{ secrets.CONTAINER_APP_WORKER_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_WORKER_NAME:-}" ]; then
            echo "revision=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REV=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --query "properties.latestRevisionName" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"

  smoke-test:
    name: Post-deploy validation (${{ github.event.inputs.target }})
    needs: deploy-container-apps
    if: github.event.inputs.action == 'deploy' && needs.deploy-container-apps.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    steps:
      - name: Post-deploy validation (health, readiness, OpenAPI, version)
        id: smoke_api
        env:
          SMOKE_TEST_BASE_URL: ${{ secrets.SMOKE_TEST_BASE_URL }}
          SMOKE_SYNTHETIC_PATH: ${{ vars.SMOKE_SYNTHETIC_PATH }}
          CD_POST_DEPLOY_MAX_ATTEMPTS: ${{ vars.CD_POST_DEPLOY_MAX_ATTEMPTS }}
          CD_POST_DEPLOY_RETRY_WAIT_SECONDS: ${{ vars.CD_POST_DEPLOY_RETRY_WAIT_SECONDS }}
        run: |
          if [ -z "${SMOKE_TEST_BASE_URL:-}" ]; then
            echo "SMOKE_TEST_BASE_URL not set — skipping post-deploy validation."
            exit 0
          fi
          chmod +x scripts/ci/cd-post-deploy-verify.sh
          bash scripts/ci/cd-post-deploy-verify.sh "${SMOKE_TEST_BASE_URL}" "${SMOKE_SYNTHETIC_PATH:-/version}"

  rollback:
    name: Roll back API/worker after failed smoke (optional)
    needs: [deploy-container-apps, smoke-test]
    if: |
      always() &&
      github.event.inputs.action == 'deploy' &&
      needs.smoke-test.result == 'failure'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deactivate new revision after failed smoke
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
          CONTAINER_APP_WORKER_NAME: ${{ secrets.CONTAINER_APP_WORKER_NAME }}
          SMOKE_TEST_BASE_URL: ${{ secrets.SMOKE_TEST_BASE_URL }}
        run: |
          if [ "${{ vars.CD_ROLLBACK_ON_SMOKE_FAILURE }}" != "true" ]; then
            echo "CD_ROLLBACK_ON_SMOKE_FAILURE is not true — skipping rollback."
            exit 0
          fi
          if [ "${{ needs.deploy-container-apps.outputs.api_rev_before_skip }}" = "true" ]; then
            echo "No API app context — skipping API rollback."
          else
            if [ -z "${SMOKE_TEST_BASE_URL:-}" ]; then
              echo "Smoke URL missing — not rolling back API."
            else
              BEFORE="${{ needs.deploy-container-apps.outputs.revision_before }}"
              AFTER="${{ needs.deploy-container-apps.outputs.revision_after }}"
              if [ -z "$AFTER" ]; then
                AFTER=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
              fi
              if [ -n "$AFTER" ] && [ "$AFTER" != "$BEFORE" ]; then
                echo "Smoke failed — deactivating API revision $AFTER (revision before deploy was $BEFORE)."
                az containerapp revision deactivate -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --revision "$AFTER"
              else
                echo "No distinct new API revision; skipping API rollback."
              fi
            fi
          fi
          if [ "${{ needs.deploy-container-apps.outputs.worker_rev_before_skip }}" = "true" ]; then
            echo "No worker app context — skipping worker rollback."
            exit 0
          fi
          WBEFORE="${{ needs.deploy-container-apps.outputs.worker_revision_before }}"
          WAFTER="${{ needs.deploy-container-apps.outputs.worker_revision_after }}"
          if [ -z "$WAFTER" ]; then
            WAFTER=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --query "properties.latestRevisionName" -o tsv)
          fi
          if [ -n "$WAFTER" ] && [ "$WAFTER" != "$WBEFORE" ]; then
            echo "Deactivating worker revision $WAFTER (revision before deploy was $WBEFORE)."
            az containerapp revision deactivate -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_WORKER_NAME" --revision "$WAFTER"
          else
            echo "No distinct new worker revision; skipping worker rollback."
          fi

  manual-rollback:
    name: Manual rollback (${{ github.event.inputs.target }})
    if: github.event.inputs.action == 'rollback'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deactivate current API revision
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            echo "AZURE_RESOURCE_GROUP and CONTAINER_APP_API_NAME are required for rollback."
            exit 1
          fi
          BEFORE=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
          if [ -z "$BEFORE" ]; then
            echo "Could not read latest revision name."
            exit 1
          fi
          echo "Deactivating revision: $BEFORE"
          az containerapp revision deactivate -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --revision "$BEFORE"
          sleep 15
          AFTER=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
          if [ -z "$AFTER" ] || [ "$AFTER" = "$BEFORE" ]; then
            echo "Expected a new active revision after deactivating $BEFORE; latest is '${AFTER:-empty}'."
            exit 1
          fi
          echo "Active revision is now: $AFTER"

  nuget-push:
    name: Pack and push API client (NuGet)
    needs: smoke-test
    if: |
      github.event.inputs.action == 'deploy' &&
      github.event.inputs.target == 'production' &&
      needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Pack and push API client (NuGet)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY not set — skipping NuGet push."
            exit 0
          fi
          dotnet restore ArchLucid.Api.Client/ArchLucid.Api.Client.csproj
          dotnet pack ArchLucid.Api.Client/ArchLucid.Api.Client.csproj \
            --no-restore -c Release -o "${RUNNER_TEMP}/nuget" \
            /p:ArchLucidApiClientPackageVersion=1.0.${{ github.run_number }}
          dotnet nuget push "${RUNNER_TEMP}/nuget/"*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  notify:
    name: CD notify and summary
    needs:
      - build-push-images
      - terraform-plan
      - terraform-apply
      - deploy-container-apps
      - smoke-test
      - rollback
      - nuget-push
      - manual-rollback
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    steps:
      - name: CD notification webhook (optional)
        env:
          CD_NOTIFY_WEBHOOK_URL: ${{ secrets.CD_NOTIFY_WEBHOOK_URL }}
          IMAGE_TAG: ${{ needs.build-push-images.outputs.image_tag }}
        run: |
          if [ -z "${CD_NOTIFY_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          TAG="${IMAGE_TAG:-${{ github.sha }}}"
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"CD ${{ job.status }} — ${{ github.event.inputs.action }} / ${{ github.event.inputs.target }} — image ${TAG} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$CD_NOTIFY_WEBHOOK_URL" || true

      - name: CD summary
        env:
          IMAGE_TAG: ${{ needs.build-push-images.outputs.image_tag }}
        run: |
          echo "## CD summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${{ github.event.inputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${IMAGE_TAG:-}" ]; then
            echo "- Image tag: ${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Image tag: ${{ github.sha }} (no build job output)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Terraform apply requested: ${{ github.event.inputs.run_terraform_apply }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Job results: build ${{ needs.build-push-images.result }}, plan ${{ needs.terraform-plan.result }}, apply ${{ needs.terraform-apply.result }}, deploy ${{ needs.deploy-container-apps.result }}, smoke ${{ needs.smoke-test.result }}, rollback ${{ needs.rollback.result }}, nuget ${{ needs.nuget-push.result }}, manual-rollback ${{ needs.manual-rollback.result }}" >> "$GITHUB_STEP_SUMMARY"
