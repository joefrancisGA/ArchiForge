# Continuous deployment: Azure OIDC login, push API/UI images to ACR, optional Terraform plan/apply, optional NuGet client push.
#
# Per GitHub Environment (staging / production), configure:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   ACR_LOGIN_SERVER (e.g. myregistry.azurecr.io) — optional; skips image push when unset
#   ACR_NAME — optional explicit registry name for `az acr login --name`
#   TF_WORKING_DIRECTORY — optional, e.g. infra/terraform-container-apps
#   NUGET_API_KEY — optional; pushes ArchiForge.Api.Client when set
#   AZURE_RESOURCE_GROUP, CONTAINER_APP_API_NAME — optional; `az containerapp update` after image push
#   CONTAINER_APP_UI_NAME — optional second Container App for the UI image
#   SMOKE_TEST_BASE_URL — optional; curl GET {base}/health/live and {base}{SMOKE_SYNTHETIC_PATH} after deploy
#   SMOKE_SYNTHETIC_PATH — optional second check (default /version); set repo/org variable if needed
#   CD_NOTIFY_WEBHOOK_URL — optional; Slack-compatible JSON webhook for job status (success/failure)
#
# Rollback: set repository variable CD_ROLLBACK_ON_SMOKE_FAILURE=true to deactivate the new API revision when smoke fails
# (restores traffic to the prior revision if Container Apps routes automatically).
#
# Container Apps image update: point your stack at ${ACR_LOGIN_SERVER}/archiforge-api:${IMAGE_TAG} (and archiforge-ui) or run Terraform apply with updated variables.
name: CD

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production
      run_terraform_apply:
        description: "Run terraform apply after plan (requires TF_WORKING_DIRECTORY and configured backend)"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: archiforge-cd-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.target }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    env:
      TF_DIR: ${{ secrets.TF_WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        run: |
          TAG="${{ vars.IMAGE_TAG }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Build and push container images
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "ACR_LOGIN_SERVER not set — skipping image push."
            exit 0
          fi
          REG_NAME="${ACR_NAME:-${ACR_LOGIN_SERVER%%.*}}"
          az acr login --name "$REG_NAME"
          docker build -f ArchiForge.Api/Dockerfile -t "${ACR_LOGIN_SERVER}/archiforge-api:${IMAGE_TAG}" .
          docker push "${ACR_LOGIN_SERVER}/archiforge-api:${IMAGE_TAG}"
          docker build -f archiforge-ui/Dockerfile -t "${ACR_LOGIN_SERVER}/archiforge-ui:${IMAGE_TAG}" ./archiforge-ui
          docker push "${ACR_LOGIN_SERVER}/archiforge-ui:${IMAGE_TAG}"

      - name: Record API revision before Container Apps update
        id: api_rev_before
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
        run: |
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REV=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update Azure Container Apps (optional)
        id: containerapp_update
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
          CONTAINER_APP_UI_NAME: ${{ secrets.CONTAINER_APP_UI_NAME }}
        run: |
          if [ -z "${ACR_LOGIN_SERVER:-}" ] || [ -z "${AZURE_RESOURCE_GROUP:-}" ] || [ -z "${CONTAINER_APP_API_NAME:-}" ]; then
            echo "Skipping Container Apps update (set ACR_LOGIN_SERVER, AZURE_RESOURCE_GROUP, CONTAINER_APP_API_NAME)."
            exit 0
          fi
          API_IMAGE="${ACR_LOGIN_SERVER}/archiforge-api:${IMAGE_TAG}"
          az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --image "$API_IMAGE"
          if [ -n "${CONTAINER_APP_UI_NAME:-}" ]; then
            UI_IMAGE="${ACR_LOGIN_SERVER}/archiforge-ui:${IMAGE_TAG}"
            az containerapp update -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_UI_NAME" --image "$UI_IMAGE"
          fi

      - name: Smoke test deployed API (optional)
        id: smoke_api
        env:
          SMOKE_TEST_BASE_URL: ${{ secrets.SMOKE_TEST_BASE_URL }}
          SMOKE_SYNTHETIC_PATH: ${{ vars.SMOKE_SYNTHETIC_PATH }}
        run: |
          if [ -z "${SMOKE_TEST_BASE_URL:-}" ]; then
            echo "SMOKE_TEST_BASE_URL not set — skipping smoke test."
            exit 0
          fi
          BASE="${SMOKE_TEST_BASE_URL%/}"
          curl -fsS "$BASE/health/live" -o /dev/null
          SYN="${SMOKE_SYNTHETIC_PATH:-/version}"
          case "$SYN" in
            /*) ;;
            *) SYN="/$SYN" ;;
          esac
          curl -fsS "$BASE$SYN" -o /dev/null

      - name: Roll back API revision after failed smoke (optional)
        if: ${{ failure() && steps.smoke_api.outcome == 'failure' }}
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_API_NAME: ${{ secrets.CONTAINER_APP_API_NAME }}
          SMOKE_TEST_BASE_URL: ${{ secrets.SMOKE_TEST_BASE_URL }}
        run: |
          if [ "${{ vars.CD_ROLLBACK_ON_SMOKE_FAILURE }}" != "true" ]; then
            echo "CD_ROLLBACK_ON_SMOKE_FAILURE is not true — skipping rollback."
            exit 0
          fi
          if [ "${{ steps.api_rev_before.outputs.skip }}" = "true" ]; then
            echo "No API app context — skipping rollback."
            exit 0
          fi
          if [ -z "${SMOKE_TEST_BASE_URL:-}" ]; then
            echo "Smoke URL missing — not rolling back."
            exit 0
          fi
          BEFORE="${{ steps.api_rev_before.outputs.revision }}"
          AFTER=$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --query "properties.latestRevisionName" -o tsv)
          if [ -z "$AFTER" ] || [ "$AFTER" = "$BEFORE" ]; then
            echo "No distinct new revision; skipping rollback."
            exit 0
          fi
          echo "Smoke failed — deactivating revision $AFTER (revision before deploy was $BEFORE)."
          az containerapp revision deactivate -g "$AZURE_RESOURCE_GROUP" -n "$CONTAINER_APP_API_NAME" --revision "$AFTER"

      - name: Setup Terraform
        if: env.TF_DIR != ''
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform plan
        if: env.TF_DIR != ''
        run: |
          cd "$TF_DIR"
          terraform init -input=false
          terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: env.TF_DIR != '' && inputs.run_terraform_apply
        run: |
          cd "$TF_DIR"
          terraform apply -input=false tfplan

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Pack and push API client (NuGet)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY not set — skipping NuGet push."
            exit 0
          fi
          dotnet restore
          dotnet pack ArchiForge.Api.Client/ArchiForge.Api.Client.csproj \
            --no-restore -c Release -o "${RUNNER_TEMP}/nuget" \
            /p:ArchiForgeApiClientPackageVersion=1.0.${{ github.run_number }}
          dotnet nuget push "${RUNNER_TEMP}/nuget/"*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: CD notification webhook (optional)
        if: always()
        env:
          CD_NOTIFY_WEBHOOK_URL: ${{ secrets.CD_NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "${CD_NOTIFY_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"CD ${{ job.status }} — ${{ github.event.inputs.target }} — image ${IMAGE_TAG:-unknown} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$CD_NOTIFY_WEBHOOK_URL" || true

      - name: CD summary
        if: always()
        run: |
          echo "## CD summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${{ github.event.inputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image tag: ${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Terraform apply: ${{ github.event.inputs.run_terraform_apply }}" >> "$GITHUB_STEP_SUMMARY"
