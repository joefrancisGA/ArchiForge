# ArchLucid public demo (local or Azure Container Apps build context)
# ─────────────────────────────────────────────────────────────────
# Merges with docker-compose.yml and adds profile `demo-hosted` so you can
# start the same full stack as `full-stack` with:
#   - ArchLucid:AgentExecution:Mode=Simulator (explicit; default is already Simulator)
#   - UI build: NEXT_PUBLIC_DEMO_URL for /get-started "Try the live demo" (points at your public demo host)
#
# Local:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml --profile demo-hosted up -d --build
#   → API http://localhost:5000, UI http://localhost:3000, SQL + Azurite + Redis
#
# Seeded data: `Demo:Enabled` + `Demo:SeedOnStartup` on the API (see main compose) runs
# `IDemoSeedService` once after DbUp — two committed Contoso Retail runs + governance fixtures
# (see `ArchLucid.Application/Bootstrap/DemoSeedService.cs`). No extra HostedService is required.
#
# On-demand environment reset: wipe the `ArchLucid` database or redeploy; there is no nightly reset.
# Visitors may create new runs in DevelopmentBypass (sandbox) unless you put the demo behind an API
# that uses JwtBearer/ApiKey in production.
# ─────────────────────────────────────────────────────────────────

include:
  - path: docker-compose.yml

services:
  api:
    profiles: ["full-stack", "demo-hosted"]
    environment:
      ArchLucid__AgentExecution__Mode: "Simulator"

  ui:
    profiles: ["full-stack", "demo-hosted"]
    build:
      context: .
      dockerfile: archlucid-ui/Dockerfile
      args:
        # Match root docker-compose `ui` service; add public demo base URL for marketing CTA
        NEXT_PUBLIC_DOCS_BASE_URL: "https://github.com/joefrancisGA/ArchLucid/blob/main"
        NEXT_PUBLIC_DEMO_URL: "https://demo.archlucid.net"
