# Recording / alert rules for ArchLucid when scraping OTLP → Prometheus or app metrics.
# Adjust metric names to match your Prometheus scrape (e.g. OTel SDK exporter naming).
groups:
  - name: archlucid-authority
    rules:
      - alert: ArchLucidAuthorityRunErrors
        expr: |
          sum(rate(traces_span_count{span_name="AuthorityRun",status_code="ERROR"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Authority pipeline spans reporting ERROR
          description: Check API/worker logs and SQL outbox `AuthorityPipelineWorkOutbox` for stuck rows.

      - alert: ArchLucidAuthorityPipelineWorkBacklog
        expr: |
          archlucid_authority_pipeline_work_pending > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Authority pipeline work outbox backlog high
          description: >-
            Observable gauge `archlucid_authority_pipeline_work_pending` (meter ArchLucid) is fed by
            `OutboxOperationalMetricsHostedService` from `dbo.AuthorityPipelineWorkOutbox`. Investigate
            workers/API authority pipeline; use GET /v1/admin/diagnostics/outboxes for detail.

      - alert: ArchLucidAuthorityPipelineWorkStale
        expr: |
          archlucid_authority_pipeline_work_oldest_pending_age_seconds > 3600
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Oldest authority outbox row is very old
          description: >-
            `archlucid_authority_pipeline_work_oldest_pending_age_seconds` exceeds 1h. Indicates stuck
            processing or sustained overload.

      - alert: ArchLucidRetrievalIndexingOutboxBacklog
        expr: |
          archlucid_retrieval_indexing_outbox_pending > 100
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Retrieval indexing outbox backlog high
          description: >-
            Gauge `archlucid_retrieval_indexing_outbox_pending` from SQL `dbo.RetrievalIndexingOutbox`.
            Check retrieval indexer worker and SQL connectivity.

      - alert: ArchLucidRetrievalIndexingOutboxStale
        expr: |
          archlucid_retrieval_indexing_outbox_oldest_pending_age_seconds > 7200
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Retrieval indexing backlog is aging
          description: >-
            Oldest pending retrieval outbox row over 2h (`archlucid_retrieval_indexing_outbox_oldest_pending_age_seconds`).

      - alert: ArchLucidIntegrationEventOutboxPublishBacklog
        expr: |
          archlucid_integration_event_outbox_publish_pending > 200
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Integration publish outbox backlog high
          description: >-
            Actionable rows in `dbo.IntegrationEventOutbox` (gauge `archlucid_integration_event_outbox_publish_pending`).
            Check Service Bus publisher / integration worker.

      - alert: ArchLucidIntegrationEventOutboxPublishStale
        expr: |
          archlucid_integration_event_outbox_oldest_actionable_pending_age_seconds > 3600
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Integration outbox publish queue is stale
          description: >-
            Oldest actionable integration outbox row over 1h
            (`archlucid_integration_event_outbox_oldest_actionable_pending_age_seconds`).

      - alert: ArchLucidIntegrationEventOutboxConvergenceSlow
        expr: |
          archlucid_integration_event_outbox_oldest_actionable_pending_age_seconds > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Integration outbox publish latency exceeding tight convergence target
          description: >-
            Oldest actionable integration outbox row over 60s for 5m. Tune in noisy environments;
            see docs/API_SLOS.md § Outbox convergence. Severe backlog: ArchLucidIntegrationEventOutboxPublishStale (1h).

      - alert: ArchLucidIntegrationEventOutboxDeadLetter
        expr: |
          archlucid_integration_event_outbox_dead_letter > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Integration event outbox has dead-letter rows
          description: >-
            Gauge `archlucid_integration_event_outbox_dead_letter` counts dead-lettered integration outbox rows.
            Use admin diagnostics and dead-letter retry flows; fix root cause before clearing.

  - name: archlucid-data-consistency
    rules:
      - alert: ArchLucidDataConsistencyOrphansDetected
        expr: |
          sum(rate(archlucid_data_consistency_orphans_detected_total[1h])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Orphan rows detected vs authority Runs
          description: >-
            `DataConsistencyOrphanProbeHostedService` incremented `archlucid_data_consistency_orphans_detected_total`
            (labels `table` = ComparisonRecords, GoldenManifests, or FindingsSnapshots; `column` = LeftRunId, RightRunId, or RunId).
            Investigate missing `dbo.Runs` keys; for comparison rows see `docs/runbooks/COMPARISON_RECORD_ORPHAN_REMEDIATION.md`.
            Probe is detection-only.

  - name: archlucid-explainability
    rules:
      - alert: ArchLucidExplanationFaithfulnessFallbackTrend
        expr: |
          increase(archlucid_explanation_aggregate_faithfulness_fallback_total[1h]) > 3
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Elevated aggregate explanation faithfulness fallbacks
          description: >-
            Counter `archlucid_explanation_aggregate_faithfulness_fallback_total` rose more than three times in 1h.
            Stakeholder aggregate explanations may be substituting deterministic narrative for LLM text; review
            finding trace completeness and explanation quality. Tune threshold per environment.
            Operator context: docs/EXPLAINABILITY_TRACE_COVERAGE.md; API narrative field: OpenAPI
            `FindingExplainabilityResult.narrativeText` (see docs/API_ERROR_CONTRACT.md for error shape elsewhere).

      - alert: ArchLucidExplanationFaithfulnessFallbackBudgetExceeded
        expr: |
          rate(archlucid_explanation_aggregate_faithfulness_fallback_total[1h])
          >
          archlucid:slo:explanation_faithfulness_fallback_budget
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Aggregate explanation faithfulness fallback rate exceeds SLO budget
          description: >-
            `rate(archlucid_explanation_aggregate_faithfulness_fallback_total[1h])` exceeded the recording rule
            `archlucid:slo:explanation_faithfulness_fallback_budget` (see infra/prometheus/archlucid-slo-rules.yml,
            group `archlucid-slo-explanation-faithfulness`) for 30m. Treat as sustained substitution of deterministic
            narrative for LLM aggregate text; see docs/EXPLAINABILITY_TRACE_COVERAGE.md.

      - alert: ArchLucidRlsBypassEnabledInProduction
        expr: archlucid_rls_bypass_enabled_info{scope="production_like"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: SQL RLS break-glass bypass is enabled on a production-like host
          description: >-
            Gauge `archlucid_rls_bypass_enabled_info{scope="production_like"}` is 1: both `ARCHLUCID_ALLOW_RLS_BYPASS=true`
            and `ArchLucid:Persistence:AllowRlsBypass=true` are set while the process is classified as Production/Staging.
            This is coordinated break-glass only; confirm intent and timeline to disable. See docs/SECURITY.md and
            docs/security/MULTI_TENANT_RLS.md.

      - alert: ArchLucidExplainabilityTraceCompletenessP10Low
        expr: |
          histogram_quantile(
            0.1,
            sum(rate(archlucid_explainability_trace_completeness_ratio_bucket[30m])) by (le)
          ) < 0.35
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: Advisory explainability trace completeness p10 is low
          description: >-
            The 10th percentile of `archlucid_explainability_trace_completeness_ratio` fell below 0.35 over a 30m
            rate window for 2h. Advisory scans may be missing explainability traces expected for stakeholder narratives.
            Tune threshold per environment; see docs/EXPLAINABILITY_TRACE_COVERAGE.md and docs/OBSERVABILITY.md.
            If the histogram is absent in Prometheus (exporter rename), fix scrape config before relying on this alert.

  - name: archlucid-trial-funnel
    rules:
      - alert: ArchLucidTrialSignupFailuresHigh
        expr: sum(rate(archlucid_trial_signup_failures_total[1m])) > (5.0 / 60.0)
        for: 10m
        labels:
          severity: page
        annotations:
          summary: Trial signup failures sustained above 5/min
          description: >-
            `archlucid_trial_signup_failures_total` rate exceeded 5 events/min for 10m. Check registration / local identity /
            trial bootstrap logs; see docs/runbooks/TRIAL_FUNNEL.md.

      - alert: ArchLucidTrialFirstRunLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(archlucid_trial_first_run_seconds_bucket[15m])) by (le)
          ) > 600
        for: 30m
        labels:
          severity: warning
          escalation: ticket
        annotations:
          summary: Trial time-to-first-manifest p95 exceeds 600s
          description: >-
            p95 of `archlucid_trial_first_run_seconds` is above 600s for 30m. Treat as product funnel friction; see
            docs/runbooks/TRIAL_FUNNEL.md and Grafana dashboard `archlucid-trial-funnel`.
