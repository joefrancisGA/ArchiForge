asyncapi: 2.6.0
info:
  title: ArchLucid outbound webhooks & integration events
  version: 1.4.0
  description: |
    ArchLucid **pushes** JSON to operator-configured HTTPS URLs for alert routing and digest delivery.
    This is **not** the primary REST API (see OpenAPI `/openapi/v1.json` and `/swagger/v1/swagger.json`).

    When `WebhookDelivery:UseHttpClient` is true and a shared secret is configured, requests include
    header `X-ArchLucid-Webhook-Signature` with value `sha256=<hex>` (HMAC-SHA256 over the raw UTF-8 body).
    Verify using `ArchLucid.Host.Core.Services.Delivery.WebhookSignature` semantics.

    **Azure Service Bus (optional):** UTF-8 JSON payloads are published to a configured queue or topic
    (`IntegrationEvents:QueueOrTopicName`). Message `subject` and application property `event_type` carry the
    logical type. **Canonical** type strings are `com.archlucid.*`; legacy V1 aliases in `IntegrationEventTypes`
    match the same payloads and should be accepted during migration. Payloads include `schemaVersion: 1`; additive fields are
    expected; breaking changes ship as new event type strings or higher schema versions documented here.

    **Bindings:** channels below map to Azure Service Bus **topic** publish (see `infra/terraform-servicebus`).
    Consumer subscriptions use `IntegrationEvents:SubscriptionName` on the worker when `ConsumerEnabled` is true.

    **Integration event payloads** (`integration*` channels) use `payload.$ref` into **JSON Schema Draft 2020-12** files under `schemas/integration-events/` (canonical with committed `.schema.json` assets).

defaultContentType: application/json
channels:
  alertTeamsIncomingWebhook:
    description: POST to a Microsoft Teams incoming webhook URL (`AlertRoutingChannelType.TeamsWebhook`).
    publish:
      operationId: postAlertTeams
      message:
        name: AlertTeamsPayload
        payload:
          type: object
          required: [title, text]
          properties:
            title:
              type: string
            text:
              type: string
  alertSlackIncomingWebhook:
    description: POST to a Slack incoming webhook URL (`AlertRoutingChannelType.SlackWebhook`).
    publish:
      operationId: postAlertSlack
      message:
        name: AlertSlackPayload
        payload:
          type: object
          required: [text]
          properties:
            text:
              type: string
  alertOnCallWebhook:
    description: POST to a generic on-call receiver (`AlertRoutingChannelType.OnCallWebhook`).
    publish:
      operationId: postAlertOnCall
      message:
        name: AlertOnCallPayload
        payload:
          type: object
          required: [severity, title, category, triggerValue, description, alertId, runId]
          properties:
            severity:
              type: string
            title:
              type: string
            category:
              type: string
            triggerValue:
              type: string
            description:
              type: string
            alertId:
              type: string
              format: uuid
            runId:
              type: string
              format: uuid
  digestTeamsIncomingWebhook:
    description: POST to a Teams incoming webhook for architecture digests (`DigestDeliveryChannelType.TeamsWebhook`).
    publish:
      operationId: postDigestTeams
      message:
        name: DigestTeamsPayload
        payload:
          type: object
          required: [title, text]
          properties:
            title:
              type: string
            text:
              type: string

  integrationAuthorityRunCompleted:
    description: |
      Service Bus message after an authority run commits successfully (`com.archlucid.authority.run.completed`; legacy V1 alias supported).
    bindings:
      serviceBus:
        bindingVersion: 0.2.0
        destination: archlucid-integration-events
        destinationType: topic
    publish:
      operationId: publishAuthorityRunCompleted
      message:
        name: AuthorityRunCompletedV1
        payload:
          $ref: '../../schemas/integration-events/authority-run-completed.v1.schema.json'

  integrationGovernanceApprovalSubmitted:
    description: Governance approval request persisted (`com.archlucid.governance.approval.submitted`; legacy V1 alias supported).
    bindings:
      serviceBus:
        bindingVersion: 0.2.0
        destination: archlucid-integration-events
        destinationType: topic
    publish:
      operationId: publishGovernanceApprovalSubmitted
      message:
        name: GovernanceApprovalSubmittedV1
        payload:
          $ref: '../../schemas/integration-events/governance-approval-submitted.v1.schema.json'

  integrationGovernancePromotionActivated:
    description: Environment activation recorded (`com.archlucid.governance.promotion.activated`; legacy V1 alias supported).
    bindings:
      serviceBus:
        bindingVersion: 0.2.0
        destination: archlucid-integration-events
        destinationType: topic
    publish:
      operationId: publishGovernancePromotionActivated
      message:
        name: GovernancePromotionActivatedV1
        payload:
          $ref: '../../schemas/integration-events/governance-promotion-activated.v1.schema.json'

  integrationAlertFired:
    description: New alert row persisted and delivered (`com.archlucid.alert.fired`; legacy V1 alias supported).
    bindings:
      serviceBus:
        bindingVersion: 0.2.0
        destination: archlucid-integration-events
        destinationType: topic
    publish:
      operationId: publishAlertFired
      message:
        name: AlertFiredV1
        payload:
          $ref: '../../schemas/integration-events/alert-fired.v1.schema.json'

  integrationAlertResolved:
    description: Alert resolved via API (`com.archlucid.alert.resolved`; legacy V1 alias supported).
    bindings:
      serviceBus:
        bindingVersion: 0.2.0
        destination: archlucid-integration-events
        destinationType: topic
    publish:
      operationId: publishAlertResolved
      message:
        name: AlertResolvedV1
        payload:
          $ref: '../../schemas/integration-events/alert-resolved.v1.schema.json'

  integrationAdvisoryScanCompleted:
    description: Advisory scan execution completed (`com.archlucid.advisory.scan.completed`; legacy V1 alias supported).
    bindings:
      serviceBus:
        bindingVersion: 0.2.0
        destination: archlucid-integration-events
        destinationType: topic
    publish:
      operationId: publishAdvisoryScanCompleted
      message:
        name: AdvisoryScanCompletedV1
        payload:
          $ref: '../../schemas/integration-events/advisory-scan-completed.v1.schema.json'
