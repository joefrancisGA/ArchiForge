# Gitleaks configuration (see https://github.com/gitleaks/gitleaks ).
# Used by gitleaks/gitleaks-action in CI. Allowlist entries are for documented,
# non-production credentials that appear in-repo by design (local Docker SQL, CI service container).

title = "ArchLucid"

[extend]
useDefault = true

[allowlist]
description = "Published dev/CI SQL passwords only — rotate if you reuse outside this repo"
regexes = [
  "ArchiForge_Dev_Pass123!",
  "ArchLucid_Dev_Pass123!",
  "LocalTesting123!",
]
