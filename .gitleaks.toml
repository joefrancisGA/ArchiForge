# Gitleaks configuration (see https://github.com/gitleaks/gitleaks ).
# Used by gacts/gitleaks in CI. Allowlist entries are for documented,
# non-production credentials that appear in-repo by design (local Docker SQL, CI service container).

title = "ArchLucid"

[extend]
useDefault = true

# v8.25+ requires [[allowlists]]; legacy [allowlist] is ignored (unlike rules.allowlist migration).
[[allowlists]]
description = "Documented non-production literals (SQL dev passwords, one retired Stripe-shaped test fixture in git history) — rotate SQL passwords if you reuse outside this repo"
paths = [
  # TB-003 named-query perf thresholds only; generic-api-key false-positive on *Keyset* in metric names (*key* keyword).
  '''(?:^|/)tests/performance/query-allowlist\.json$''',
]
regexes = [
  "ArchiForge_Dev_Pass123!",
  "ArchLucid_Dev_Pass123!",
  "LocalTesting123!",
  # Removed from HEAD (ArchLucidConfigurationRulesTests) but still present in git blobs; gitleaks scans full history (ci.yml fetch-depth: 0). Not a real Stripe key — never reuse this pattern in new commits.
  "sk_test_12345678901234567890123456789012",
  # PGP recipe doc once showed a Markdown inline example of a 16-hex short key id; not a real API key (gitleaks generic-api-key false positive in git history).
  # generic-api-key stores only the captured secret (the hex tail), not the full "Key ID: …" prefix — allowlist both shapes.
  "Key ID: ABCD0123EF456789",
  "ABCD0123EF456789",
  # vault-service-token false positive: legacy rule matches `s.` + 24 [a-z0-9]; property name ComparisonAuditEvents30d yields that length after `s.` in C#. Not a credential — escape `.` (allowlist values are regex).
  "s\\.ComparisonAuditEvents30d",
  # docs/runbooks/STRIPE_STAGING_E2E_VERIFICATION.md (historical blob before Bearer ${JWT}): curl-auth-header captures the placeholder token after `Bearer`.
  "YOUR_JWT",
]
